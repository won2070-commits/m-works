<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M.Works — 들리는 설교, 끌리는 설교</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="M.Works">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png?v=89">
<link rel="stylesheet" href="style.css?v=89">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23ffffff'/><rect x='4' y='4' width='72' height='72' rx='18' fill='%23FFC000'/><text x='40' y='52' transform='scale(1 1.2)' font-size='44' font-weight='800' text-anchor='middle' fill='%23ffffff' font-family='-apple-system,Helvetica,Arial,sans-serif'>M</text><rect x='48' y='42' width='44' height='44' rx='12' fill='%23FF5600' stroke='%23ffffff' stroke-width='3'/><text x='70' y='62.7' transform='scale(1 1.2)' font-size='26' font-weight='800' text-anchor='middle' fill='%23000000' font-family='-apple-system,Helvetica,Arial,sans-serif'>W</text></svg>">
</head>
<body>

<!-- ───────── 상단 바 ───────── -->
<header id="topbar">
  <button id="btn-menu" class="icon-btn" title="메뉴" aria-label="메뉴 열기">☰</button>
  <button id="btn-back" class="icon-btn" title="뒤로 가기" aria-label="뒤로 가기"><svg class="nav-ico" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M15 19l-7-7 7-7"/></svg></button>
  <div class="logo" id="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="M.Works 로고">
        <rect x="4" y="4" width="72" height="72" rx="18" fill="#FFC000"/>
        <text x="40" y="52" transform="scale(1 1.2)" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="800" text-anchor="middle" fill="#ffffff">M</text>
        <rect x="48" y="42" width="44" height="44" rx="12" fill="#FF5600" stroke="#ffffff" stroke-width="3"/>
        <text x="70" y="62.7" transform="scale(1 1.2)" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="800" text-anchor="middle" fill="#000000">W</text>
      </svg>
    </div>
    <div class="logo-text">
      <strong>M.Works</strong>
    </div>
  </div>
  <div id="save-status" class="save-status" title="자동 저장 상태"></div>
  <button class="icon-btn top-tool" id="top-settings" title="설정" aria-label="설정"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.87l.06.06a2 2 0 11-2.83 2.83l-.06-.06A1.7 1.7 0 0015 19.4a1.7 1.7 0 00-1 1.56V21a2 2 0 11-4 0v-.09A1.7 1.7 0 009 19.4a1.7 1.7 0 00-1.87.34l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.7 1.7 0 004.6 15a1.7 1.7 0 00-1.56-1H3a2 2 0 110-4h.09A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.34-1.87l-.06-.06a2 2 0 112.83-2.83l.06.06A1.7 1.7 0 009 4.6a1.7 1.7 0 001-1.56V3a2 2 0 114 0v.09a1.7 1.7 0 001 1.51 1.7 1.7 0 001.87-.34l.06-.06a2 2 0 112.83 2.83l-.06.06A1.7 1.7 0 0019.4 9c.06.32.1.66.1 1a1.7 1.7 0 001.56 1H21a2 2 0 110 4h-.09a1.7 1.7 0 00-1.51 1z"/></svg></button>
</header>

<div id="layout">

  <!-- ───────── 왼쪽 내비 ───────── -->
  <nav id="sidenav">
    <ol id="step-nav" class="step-nav">
      <li data-step="0"><span class="num">＋</span><span class="lbl">새 설교 시작</span><span class="chk"></span></li>
      <li data-step="1"><span class="num">1</span><span class="lbl">본문 찾기</span><span class="chk"></span></li>
      <li data-step="2"><span class="num">2</span><span class="lbl">중심사상</span><span class="chk"></span></li>
      <li data-step="4"><span class="num">3</span><span class="lbl">형식 결정</span><span class="chk"></span></li>
      <li data-step="3"><span class="num">4</span><span class="lbl">설교 작성</span><span class="chk"></span></li>
      <li data-step="5"><span class="num">5</span><span class="lbl">연습하기</span><span class="chk"></span></li>
    </ol>
    <div class="nav-progress"><div class="nav-progress-bar" id="nav-progress-bar"></div></div>
    <div class="nav-progress-label" id="nav-progress-label">진행률 0%</div>
    <div class="nav-footer">
      <button class="nav-link" id="btn-save"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>저장</button>
      <button class="nav-link" id="btn-export"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M12 15V3m0 0L8 7m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>내보내기</button>
      <button class="nav-link" id="btn-nav-materials"><svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M3 15h18M9 7h6"/></svg>자료 서랍<span id="nav-mat-count" class="nav-count hidden"></span></button>
      <button class="nav-link" id="btn-nav-files"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>파일 보기</button>
      <button class="nav-link" id="btn-nav-exit" title="원고를 저장하고 앱을 닫습니다. 앱 잠금을 설정했다면 다시 잠깁니다."><svg class="nav-ico" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>나가기</button>
      <div class="ai-badge" id="ai-badge">AI 연결 확인 중…</div>
      <div class="app-ver" id="app-ver"></div>
    </div>
  </nav>

  <!-- 휴대폰에서 메뉴 열렸을 때 바깥 터치로 닫는 배경 -->
  <div id="nav-backdrop"></div>

  <!-- ───────── 중앙 작업 영역 ───────── -->
  <main id="main"><!-- app.js 가 렌더링 --></main>

  <!-- ───────── 오른쪽 컨텍스트 패널 ───────── -->
  <aside id="context">
    <h3>작업 요약</h3>
    <div id="ctx-body"><!-- app.js 가 렌더링 --></div>
    <div class="ctx-tools">
      <h3 class="tool-h" style="margin-top:22px"><svg class="tool-ico" viewBox="0 0 24 24"><path d="M3.6 5.4c2.6-1 5.2-1 7.8 0v13.2c-2.6-1-5.2-1-7.8 0V5.4z"/><path d="M11.4 5.4c2.6-1 5.2-1 7.8 0v13.2c-2.6-1-5.2-1-7.8 0"/><path d="M11.4 5.4v13.2"/><path d="M16 3.4v6l1.8-1.3L19.6 9.4v-6"/></svg>성경 구절 · 낱말 찾기</h3>
      <div class="tool-row"><input id="tool-verse-in" placeholder="요 3:16  또는  사랑"><button class="btn btn-primary btn-sm" id="tool-verse-go">찾기</button></div>
      <div class="tool-hint">구절을 넣으면 <b>본문</b>을, 낱말을 넣으면 <b>그 낱말이 담긴 구절들</b>을 찾아 줍니다.</div>
      <div id="tool-verse-out" class="tool-out"></div>
      <h3 class="tool-h" style="margin-top:18px"><svg class="tool-ico" viewBox="0 0 24 24"><path d="M3.6 8.4h11.2"/><path d="M11.8 5.2l3.2 3.2-3.2 3.2"/><path d="M20.4 15.6H9.2"/><path d="M12.4 12.4l-3.2 3.2 3.2 3.2"/></svg>유의어 사전</h3>
      <div class="tool-row"><input id="tool-syn-in" placeholder="단어를 입력하세요"><button class="btn btn-primary btn-sm" id="tool-syn-go">찾기</button></div>
      <div id="tool-syn-out" class="tool-out"></div>
      <h3 class="tool-h" style="margin-top:18px"><svg class="tool-ico" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20V4a2 2 0 00-2-2H6.5A2.5 2.5 0 004 4.5v15z"/><path d="M4 19.5A2.5 2.5 0 006.5 22H20v-5"/><circle cx="11.5" cy="9" r="2.6"/><path d="M13.4 10.9l2.6 2.6"/></svg>로고스 바이블 검색</h3>
      <div class="tool-row"><input id="tool-logos-in" placeholder="원어·주석·설교 자료 검색어"><button class="btn btn-primary btn-sm" id="tool-logos-go">검색</button></div>
      <div class="tool-hint">로고스를 쓰시는 분용 — <b>[검색]</b>은 컴퓨터의 로고스 앱을 바로 엽니다. 앱이 없으면 아래 웹으로.</div>
      <div class="tool-mode"><button id="tool-logos-web">로고스 웹(app.logos.com)에서 검색</button></div>
    </div>
  </aside>
</div>

<!-- ───────── 모달 ───────── -->
<div id="modal-backdrop" class="hidden">
  <div id="modal" role="dialog" aria-modal="true">
    <div id="modal-head"><h3 id="modal-title"></h3><button id="modal-close" class="icon-btn">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ───────── 토스트 ───────── -->
<div id="toast" class="hidden"></div>

<!-- ───────── AI 진행 표시 ───────── -->
<div id="ai-progress" class="hidden">
  <div class="ai-progress-box">
    <div class="ai-ring">
      <svg viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52"/>
        <circle class="ring-fg" id="ai-ring-fg" cx="60" cy="60" r="52"/>
      </svg>
      <div class="ai-ring-mid">
        <div id="ai-progress-timer">0:00</div>
        <div id="ai-ring-left">남은 시간 계산 중</div>
      </div>
    </div>
    <div id="ai-progress-label">AI가 작업하는 중…</div>
    <div id="ai-progress-sub" class="hidden"></div>
    <div id="ai-progress-stage">준비하는 중…</div>
    <div id="ai-progress-say" class="hidden"></div>
    <div id="ai-progress-preview" class="hidden"></div>
    <div id="ai-progress-tip" class="hidden"></div>
    <button id="ai-cancel" class="btn btn-ghost">취소</button>
  </div>
</div>

<script src="prompts.js?v=89"></script>
<script src="app.js?v=89"></script>
<script>
// PWA 설치 지원 — http/https에서만 (file:// 단일 파일에서는 건너뜀)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update(); // 앱을 열 때마다 새 버전 확인
    document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update(); });
  }).catch(() => {});
  let swRefreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swRefreshed) return; swRefreshed = true;
    location.reload(); // 새 버전이 준비되면 자동으로 한 번 새로고침해 즉시 적용
  });
}
</script>
</body>
</html>
