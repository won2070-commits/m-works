<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M-WORKS — 들리는 설교, 끌리는 설교</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="M-WORKS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23c5b0f4'/><text x='50' y='64' font-size='52' font-weight='700' letter-spacing='-2' text-anchor='middle' fill='%23000000' font-family='-apple-system,Helvetica,Arial,sans-serif'>M</text><text x='50' y='84' font-size='10' letter-spacing='3' text-anchor='middle' fill='%23000000' opacity='.6' font-family='Menlo,monospace'>WORKS</text></svg>">
</head>
<body>

<!-- ───────── 상단 바 ───────── -->
<header id="topbar">
  <button id="btn-menu" class="icon-btn" title="메뉴" aria-label="메뉴 열기">☰</button>
  <div class="logo" id="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="M-WORKS 로고">
        <rect width="100" height="100" rx="24" fill="#c5b0f4"/>
        <text x="50" y="63" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700" letter-spacing="-2" text-anchor="middle" fill="#000000">M</text>
        <text x="50" y="83" font-family="Menlo, 'SF Mono', monospace" font-size="10" letter-spacing="3" text-anchor="middle" fill="#000000" opacity=".6">WORKS</text>
      </svg>
    </div>
    <div class="logo-text">
      <strong>M-WORKS</strong>
      <span>들리는 설교, 끌리는 설교</span>
    </div>
  </div>
  <div id="top-title" class="top-title" title="현재 설교 제목">새 설교</div>
  <div id="save-status" class="save-status" title="자동 저장 상태">—</div>
  <div class="top-actions">
    <button id="btn-archive" class="top-btn" title="보관함 열기">📚 보관함</button>
    <button id="btn-save" class="top-btn" title="지금 저장">💾 저장</button>
    <button id="btn-export" class="top-btn" title="문서 내보내기">📄 내보내기</button>
    <button id="btn-settings" class="icon-btn" title="설정">⚙️</button>
  </div>
</header>

<div id="layout">

  <!-- ───────── 왼쪽 내비 ───────── -->
  <nav id="sidenav">
    <button id="btn-new" class="new-btn">＋ 새 설교 시작</button>
    <div class="nav-project" id="nav-project-title">프로젝트 없음</div>
    <ol id="step-nav" class="step-nav">
      <li data-step="0"><span class="num">📋</span><span class="lbl">기본 정보</span><span class="chk"></span></li>
      <li data-step="1"><span class="num">1</span><span class="lbl">본문 찾기</span><span class="chk"></span></li>
      <li data-step="2"><span class="num">2</span><span class="lbl">중심사상</span><span class="chk"></span></li>
      <li data-step="3"><span class="num">3</span><span class="lbl">설교 작성</span><span class="chk"></span></li>
      <li data-step="4"><span class="num">4</span><span class="lbl">형식 결정</span><span class="chk"></span></li>
      <li data-step="5"><span class="num">5</span><span class="lbl">연습하기</span><span class="chk"></span></li>
    </ol>
    <div class="nav-progress"><div class="nav-progress-bar" id="nav-progress-bar"></div></div>
    <div class="nav-progress-label" id="nav-progress-label">진행률 0%</div>
    <div class="nav-footer">
      <button class="nav-link" id="btn-nav-import"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M12 3v10m0 0l-4-4m4 4l4-4M4 15v4a2 2 0 002 2h12a2 2 0 002-2v-4"/></svg>설교 가져오기</button>
      <button class="nav-link" id="btn-nav-clinic"><svg class="nav-ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>설교 피드백</button>
      <button class="nav-link" id="btn-nav-materials"><svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M3 15h18M9 7h6"/></svg>자료 서랍</button>
      <button class="nav-link" id="btn-nav-rules"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h4M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M9 3v18M9 8h-3M9 13h-3M9 18h-3"/></svg>나의 작성 규칙</button>
      <button class="nav-link" id="btn-nav-prompts"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20V4a2 2 0 00-2-2H6.5A2.5 2.5 0 004 4.5v15zM4 19.5A2.5 2.5 0 006.5 22H20v-5"/></svg>프롬프트 서재</button>
      <button class="nav-link" id="btn-nav-archive"><svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="5" rx="1.5"/><path d="M5 9v9a2 2 0 002 2h10a2 2 0 002-2V9M10 13h4"/></svg>프로젝트 보관함</button>
      <button class="nav-link" id="btn-nav-forms"><svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>나의 설교 형식</button>
      <button class="nav-link" id="btn-nav-settings"><svg class="nav-ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.87l.06.06a2 2 0 11-2.83 2.83l-.06-.06A1.7 1.7 0 0015 19.4a1.7 1.7 0 00-1 1.56V21a2 2 0 11-4 0v-.09A1.7 1.7 0 009 19.4a1.7 1.7 0 00-1.87.34l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.7 1.7 0 004.6 15a1.7 1.7 0 00-1.56-1H3a2 2 0 110-4h.09A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.34-1.87l-.06-.06a2 2 0 112.83-2.83l.06.06A1.7 1.7 0 009 4.6a1.7 1.7 0 001-1.56V3a2 2 0 114 0v.09a1.7 1.7 0 001 1.51 1.7 1.7 0 001.87-.34l.06-.06a2 2 0 112.83 2.83l-.06.06A1.7 1.7 0 0019.4 9c.06.32.1.66.1 1a1.7 1.7 0 001.56 1H21a2 2 0 110 4h-.09a1.7 1.7 0 00-1.51 1z"/></svg>설정</button>
      <div class="ai-badge" id="ai-badge">AI 연결 확인 중…</div>
    </div>
  </nav>

  <!-- ───────── 중앙 작업 영역 ───────── -->
  <main id="main"><!-- app.js 가 렌더링 --></main>

  <!-- ───────── 오른쪽 컨텍스트 패널 ───────── -->
  <aside id="context">
    <h3>작업 요약</h3>
    <div id="ctx-body"><!-- app.js 가 렌더링 --></div>
  </aside>
</div>

<!-- ───────── 모달 ───────── -->
<div id="modal-backdrop" class="hidden">
  <div id="modal" role="dialog" aria-modal="true">
    <div id="modal-head"><h3 id="modal-title"></h3><button id="modal-close" class="icon-btn">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ───────── 토스트 ───────── -->
<div id="toast" class="hidden"></div>

<!-- ───────── AI 진행 표시 ───────── -->
<div id="ai-progress" class="hidden">
  <div class="ai-progress-box">
    <div class="ai-spinner"></div>
    <div id="ai-progress-label">AI가 작업하는 중…</div>
    <div id="ai-progress-timer">0초</div>
    <button id="ai-cancel" class="btn btn-ghost">취소</button>
  </div>
</div>

<script src="prompts.js"></script>
<script src="app.js"></script>
<script>
// PWA 설치 지원 — http/https에서만 (file:// 단일 파일에서는 건너뜀)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
