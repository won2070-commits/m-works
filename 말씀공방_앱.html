<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M.Works — 들리는 설교, 끌리는 설교</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="M.Works">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png?v=82">
<style>
/* ─────────────────────────────────────────────
   M-WORKS — Figma 디자인 언어
   모노크롬 프레임(블랙 잉크 · 화이트 캔버스 · 필 버튼)
   + 파스텔 컬러블록(라임·라일락·크림·민트·핑크·네이비)
   ───────────────────────────────────────────── */
:root {
  --ink: #000000;
  --canvas: #ffffff;
  --surface-soft: #f7f7f5;
  --hairline: #e6e6e6;
  --hairline-soft: #f1f1f1;
  --lime: #dceeb1;
  --lilac: #c5b0f4;
  --cream: #f4ecd6;
  --pink: #efd4d4;
  --mint: #c8e6cd;
  --coral: #f3c9b6;
  --navy: #1f1d3d;
  --magenta: #ff3d8b;
  --success: #1ea64a;
  --fin: #ff5600;          /* Fin Orange — AI 전용 악센트 (AI CTA·배지에만) */
  --gold: #FFC000;         /* Lamborghini Gold — Primary CTA 악센트 */
  --r-xs: 2px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 24px;
  --r-pill: 50px;
  --r-full: 9999px;
  --sans: "figmaSans", Inter, -apple-system, BlinkMacSystemFont, system-ui, "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  --mono: "figmaMono", "SF Mono", ui-monospace, Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; }
body {
  font-family: var(--sans);
  background: var(--canvas);
  color: var(--ink);
  line-height: 1.45;
  letter-spacing: -0.015em;
  font-weight: 400;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: 1rem; color: var(--ink); }
h1, h2, h3, h4 { color: var(--ink); line-height: 1.15; font-weight: 600; letter-spacing: -0.025em; }
.hidden { display: none !important; }
::selection { background: var(--lime); }

/* ───────── 상단 바 — 화이트 top-nav ───────── */
#topbar {
  display: flex; align-items: center; gap: 14px;
  background: var(--canvas); color: var(--ink);
  border-bottom: 1px solid var(--hairline);
  padding: calc(10px + env(safe-area-inset-top, 0px)) 20px 10px; position: sticky; top: 0; z-index: 50;
  min-height: 76px;
}
.logo { display: flex; align-items: center; gap: 18px; cursor: pointer; margin-left: 28px; }
.logo-lockup { height: 72px; width: auto; display: block; }
.logo-mark {
  width: 62px; height: 62px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 100%; height: 100%; display: block; }
.logo-text { display: flex; flex-direction: column; justify-content: center; line-height: 1.1; }
.logo-text strong { font-size: 2.1rem; font-weight: 700; letter-spacing: 0.02em; color: var(--ink); }
.top-title {
  flex: 1; text-align: center; font-size: .84rem; font-weight: 400;
  color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.save-status { font-size: .66rem; font-family: var(--mono); letter-spacing: .04em; color: var(--ink); opacity: .75; min-width: 88px; text-align: right; margin-left: auto; }
.save-status:empty { min-width: 0; }
.top-actions { display: flex; gap: 8px; align-items: center; }
.top-btn {
  background: var(--canvas); color: var(--ink);
  border: 1px solid var(--hairline); border-radius: var(--r-pill);
  padding: 8px 16px; font-size: .78rem; font-weight: 500; letter-spacing: -0.01em;
  transition: transform .12s ease, border-color .15s;
}
.top-btn:hover { border-color: var(--ink); }
.top-btn:active { transform: scale(0.96); }
.icon-btn {
  background: none; border: none; color: inherit; font-size: 1.05rem;
  padding: 6px 9px; border-radius: var(--r-full);
  transition: transform .12s ease, background .15s;
}
.icon-btn:hover { background: var(--surface-soft); }
.icon-btn:active { transform: scale(0.95); }
.top-tool { color: var(--ink); opacity: .85; }
.top-tool:hover { opacity: 1; }
#btn-menu { display: none; color: var(--ink); }
#nav-backdrop { display: none; }
/* 산뜻한 파스텔 스트립 — 상단바 아래 시그니처 라인 */
#topbar::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px;
  background: linear-gradient(90deg, var(--lime) 0 20%, var(--mint) 20% 40%, var(--lilac) 40% 60%, var(--cream) 60% 80%, var(--pink) 80% 100%);
}

/* ───────── 레이아웃 ───────── */
#layout {
  display: grid;
  grid-template-columns: 236px minmax(0, 1fr) 280px;
  min-height: calc(100vh - 57px);
}

/* ───────── 왼쪽 내비 — 화이트 + 헤어라인 ───────── */
#sidenav {
  background: var(--canvas); color: var(--ink);
  border-right: 1px solid var(--hairline);
  padding: 20px 14px; display: flex; flex-direction: column; gap: 6px;
}
.new-btn {
  background: var(--ink); color: #fff; font-weight: 500;
  border: none; border-radius: var(--r-pill); padding: 11px 20px; font-size: .92rem;
  margin-bottom: 12px; transition: transform .12s ease;
}
.new-btn:active { transform: scale(0.96); }
.nav-project {
  font-size: .7rem; font-family: var(--mono); letter-spacing: .03em;
  color: var(--ink); opacity: .78; padding: 2px 8px 12px;
  border-bottom: 1px solid var(--hairline); margin-bottom: 10px;
  display: flex; align-items: center; gap: 7px;
}
.nav-project span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-project .nav-ico { flex-shrink: 0; opacity: .8; }
.step-nav { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.step-nav li {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--r-pill); cursor: pointer;
  font-size: .88rem; font-weight: 400; color: var(--ink); transition: background .15s;
}
.step-nav li:hover { background: var(--surface-soft); }
.step-nav li.active { background: var(--lime); color: #000; font-weight: 700; }
.step-nav li.done .chk::after { content: "✓"; color: var(--success); font-weight: 700; }
.step-nav li.active .chk::after { color: var(--success); }
.step-nav li.locked { opacity: .35; cursor: not-allowed; }
.step-nav .num {
  width: 23px; height: 23px; border-radius: var(--r-full);
  background: var(--surface-soft); color: var(--ink);
  font-size: .74rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
/* 새 설교 시작(첫 항목) — 라일락으로 구별 */
.step-nav li[data-step="0"] { background: var(--coral); color: #000; font-weight: 700; }
.step-nav li[data-step="0"]:hover { filter: brightness(1.04); background: var(--coral); }
.step-nav li[data-step="0"].active { background: var(--coral); color: #000; }
.step-nav li[data-step="0"] .num { background: rgba(0,0,0,.1); color: #000; }
.step-nav li[data-step="0"].active .num { background: rgba(0,0,0,.1) !important; color: #000; }
/* 단계별 파스텔 번호 */
.step-nav li[data-step="1"] .num { background: var(--lime); }
.step-nav li[data-step="2"] .num { background: var(--mint); }
.step-nav li[data-step="3"] .num { background: var(--lilac); }
.step-nav li[data-step="4"] .num { background: var(--cream); }
.step-nav li[data-step="5"] .num { background: var(--pink); }
.step-nav li.active .num { background: #fff !important; color: #000; }
.step-nav .lbl { flex: 1; }
.nav-progress {
  height: 5px; background: var(--hairline-soft); border-radius: 3px;
  margin: 16px 8px 6px; overflow: hidden;
}
.nav-progress-bar { height: 100%; width: 0; background: var(--ink); transition: width .4s; }
.nav-progress-label { font-size: .66rem; font-family: var(--mono); letter-spacing: .05em; color: var(--ink); opacity: .75; padding: 0 8px; }
.nav-footer { margin-top: auto; display: flex; flex-direction: column; gap: 2px; padding-top: 16px; }
.nav-link {
  background: none; border: none; color: var(--ink); text-align: left;
  padding: 8px 12px; font-size: .8rem; border-radius: var(--r-pill);
  display: flex; align-items: center; gap: 9px;
}
.nav-link:hover { background: var(--surface-soft); }
.nav-ico, .btn-ico {
  width: 16px; height: 16px; flex-shrink: 0;
  fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.btn-ico { width: 17px; height: 17px; vertical-align: -3px; margin-right: 7px; }
.ai-badge {
  margin-top: 10px; font-size: .68rem; font-family: var(--mono); letter-spacing: .02em;
  padding: 9px 12px; border-radius: var(--r-md);
  background: var(--surface-soft); color: var(--ink); line-height: 1.5;
}
.ai-badge.ok { background: var(--lime); }
.ai-badge.bad { background: var(--pink); }

/* ───────── 중앙 ───────── */
#main { padding: 36px 40px 90px; max-width: 980px; width: 100%; margin: 0 auto; }
.step-head {
  margin-bottom: 8px; font-size: .72rem; font-family: var(--mono);
  letter-spacing: .08em; text-transform: uppercase; color: var(--ink); opacity: .78;
}
.step-title { font-size: 1.9rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; color: #222; }
.step-desc { color: var(--ink); font-weight: 400; font-size: .94rem; margin-bottom: 28px; max-width: 640px; }

.card {
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg);
  padding: 26px; margin-bottom: 18px;
}
.card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
.card h4 { font-size: .96rem; font-weight: 600; margin: 14px 0 6px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
.form-grid .full { grid-column: 1 / -1; }
.field label { display: block; font-size: .8rem; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
.field label .req { color: var(--magenta); }
.field label .opt { color: var(--ink); opacity: .75; font-weight: 400; font-size: .74rem; }
.field input, .field textarea, .field select {
  width: 100%; padding: 12px 14px; border: 1px solid var(--hairline); border-radius: var(--r-md);
  background: var(--canvas); transition: border-color .15s, box-shadow .15s;
}
.field textarea { min-height: 74px; resize: vertical; line-height: 1.5; }
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px var(--lime);
}
.field .hint { font-size: .74rem; color: var(--ink); opacity: .75; margin-top: 4px; }

.btn {
  border: none; border-radius: var(--r-pill); padding: 10px 20px; font-size: .92rem;
  font-weight: 500; letter-spacing: -0.005em;
  transition: transform .12s ease, background .15s, border-color .15s;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--ink); color: #fff; }
.btn-gold { background: var(--ink); color: #fff; }
/* 새 설교 시작(홈) — 라일락으로 구별 */
#home-new { background: var(--coral) !important; color: #000 !important; font-weight: 700; }
#home-new:hover { filter: brightness(1.04); }
.btn-ghost { background: var(--canvas); border: 1px solid var(--hairline); color: var(--ink); }
.btn-ghost:hover { border-color: var(--ink); }
.btn-sm { padding: 8px 15px; font-size: .8rem; }
.btn-danger { background: var(--canvas); border: 1px solid var(--hairline); color: var(--magenta); }
.btn-danger:hover { border-color: var(--magenta); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
/* AI 실행 버튼 — Fin Orange 악센트 (🤖 버튼에 자동 적용) */
.btn-ai { background-color: #ff5600 !important; background-image: none !important; color: #fff !important; border: none !important; }
.btn-ai:hover { filter: brightness(1.07); }
.ai-badge.ok { background: rgba(255,86,0,.1); color: var(--fin); }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; align-items: center; }
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
.chip {
  background: var(--canvas); color: var(--ink); border: 1px solid var(--hairline);
  border-radius: var(--r-pill); padding: 8px 16px; font-size: .78rem; font-weight: 400;
  transition: transform .12s ease, background .15s, border-color .15s;
}
.chip:hover { background: var(--surface-soft); border-color: var(--ink); }
.chip:active { transform: scale(0.96); }

/* 참고 자료 드롭존 */
.dropzone {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  border: 2px dashed var(--hairline); border-radius: var(--r-md);
  padding: 22px 16px; text-align: center; cursor: pointer;
  font-size: .84rem; color: var(--ink); background: var(--surface-soft);
  transition: border-color .15s, background .15s;
}
.dropzone small { opacity: .6; font-size: .72rem; }
.dropzone:hover, .dropzone.dragover { border-color: var(--ink); background: var(--lime); }
.dropzone.dragover { border-style: solid; }
.ref-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border: 1px solid var(--hairline); border-radius: var(--r-md);
  margin-bottom: 6px; font-size: .84rem; background: var(--canvas);
}
.paste-row { display: flex; gap: 8px; margin-top: 10px; }
.paste-row textarea {
  flex: 1; min-height: 60px; padding: 10px 12px;
  border: 1px solid var(--hairline); border-radius: var(--r-md); line-height: 1.5;
}
.paste-row textarea:focus { outline: none; border-color: var(--ink); }
.paste-row .btn { align-self: flex-end; }
/* 뒤로 가기 — 언제나 보이는 원형 버튼 (없으면 홈으로) */
#btn-back {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; padding: 0;
  border: 1px solid var(--hairline); border-radius: var(--r-full);
  background: var(--canvas); opacity: 1 !important;
}
#btn-back:hover { border-color: var(--ink); background: var(--surface-soft); }

/* 본문 후보 카드 */
.cand {
  border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 20px 22px;
  margin-bottom: 14px; background: var(--canvas); cursor: pointer; transition: border-color .15s;
}
.cand:hover { border-color: var(--ink); }
.cand.selected { border: 2px solid var(--ink); padding: 19px 21px; background: var(--surface-soft); }
.cand-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.cand-ref { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; color: var(--ink); }
.cand-fit { margin-left: auto; font-size: .7rem; font-family: var(--mono); letter-spacing: .04em; color: var(--ink); background: var(--lime); border-radius: var(--r-pill); padding: 3px 10px; }
.cand-title { color: var(--ink); opacity: .78; font-size: .88rem; font-weight: 400; }
.cand dl { margin-top: 10px; font-size: .85rem; display: none; }
.cand.open dl { display: block; }
.cand dt { font-weight: 600; color: var(--ink); margin-top: 8px; font-size: .76rem; }
.cand dd { margin-left: 0; color: var(--ink); font-weight: 400; }
.cand-toggle { font-size: .78rem; font-weight: 500; color: var(--ink); margin-top: 8px; background: none; border: none; text-decoration: underline; }

/* 중심사상 3문장 — 파스텔 스티키 노트 */
.three-sent { display: grid; gap: 12px; }
.sent-box { padding: 14px 18px; background: var(--surface-soft); border-radius: var(--r-md); }
.sent-box.exe { background: var(--cream); }
.sent-box.theo { background: var(--mint); }
.sent-box.hom { background: var(--lilac); }
.sent-box .tag { font-size: .66rem; font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; font-weight: 400; color: var(--ink); opacity: .85; }
.sent-box textarea {
  width: 100%; border: none; background: transparent; font-family: var(--sans);
  font-size: .98rem; line-height: 1.55; resize: vertical; min-height: 48px; margin-top: 5px; color: var(--ink);
}
.sent-box textarea:focus { outline: 1px dashed var(--ink); }
.checks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.check-pill { font-size: .7rem; padding: 4px 12px; border-radius: var(--r-pill); border: 1px solid var(--hairline); color: var(--ink); }
.check-pill.ok { background: var(--lime); border-color: transparent; }
.check-pill.no { background: var(--pink); border-color: transparent; }

/* ───────── 편집기 ───────── */
#editor-wrap { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); overflow: hidden; }
#editor-toolbar {
  display: flex; flex-wrap: wrap; gap: 2px; padding: 8px 10px;
  background: var(--surface-soft);
  border-bottom: 1px solid var(--hairline);
  position: sticky; top: 57px; z-index: 20;
}
#editor-toolbar button, #editor-toolbar select {
  background: none; border: 1px solid transparent; border-radius: var(--r-pill);
  padding: 5px 11px; font-size: .8rem; color: var(--ink);
  transition: transform .12s ease, background .15s;
}
#editor-toolbar button:hover { background: var(--canvas); border-color: var(--hairline); }
#editor-toolbar button:active { transform: scale(0.95); }
#editor-toolbar button.on { background: var(--ink); color: #fff; }
#editor-toolbar .sep { width: 1px; background: var(--hairline); margin: 4px 6px; }
#editor {
  min-height: 480px; padding: 40px 48px; outline: none; overflow-y: auto;
  font-family: var(--sans); font-size: 1rem; font-weight: 400; line-height: 1.8; color: var(--ink);
  letter-spacing: -0.01em; max-width: 100%;
}
#editor:empty::before { content: "여기에 설교 원고가 작성됩니다…"; color: var(--ink); opacity: .35; }
#editor h1 { font-size: 1.8rem; font-weight: 340; letter-spacing: -0.03em; margin: .4em 0 .5em; }
#editor h2 { font-size: 1.25rem; font-weight: 600; margin: 1.3em 0 .4em; border-bottom: 1px solid var(--hairline-soft); padding-bottom: .25em; }
#editor h3 { font-size: 1.06rem; font-weight: 600; margin: 1em 0 .3em; }
#editor p { margin: .55em 0; }
/* 단락 시작(pgap) — 빈 줄로 구분된 단락 사이에 넉넉한 여백을 둬 눈으로 단락이 나뉘게 */
#editor p.pgap, .stream-preview p.pgap, #rehearsal-text p.pgap { margin-top: 1.35em; }
/* 설교 파일 탐색기 */
.fx-row {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; border-radius: var(--r-md);
  font-size: .9rem; cursor: pointer;
  border-bottom: 1px solid var(--hairline-soft);
}
.fx-row:last-child { border-bottom: none; }
.fx-row:hover { background: var(--surface-soft); }
.fx-row.fx-dim { opacity: .55; cursor: default; }
.fx-ico { flex-shrink: 0; }
/* T-파싱 단어 주해 상자 — 해당 행 바로 아래에 펼쳐진다 */
.tp-ex {
  background: var(--surface-soft); border-left: 3px solid var(--ink);
  border-radius: var(--r-md); padding: 10px 14px; margin: 2px 0 8px;
}
/* 왼쪽 메뉴 자료 서랍 개수 배지 */
.nav-count {
  margin-left: auto; flex-shrink: 0;
  min-width: 20px; height: 18px; padding: 0 6px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--ink); color: var(--canvas, #fff);
  border-radius: 999px; font-size: .66rem; font-weight: 700; font-family: var(--mono);
}
#editor blockquote {
  background: var(--cream); padding: 14px 18px;
  margin: .8em 0; color: var(--ink); border-radius: var(--r-md);
}
#editor ul, #editor ol { padding-left: 1.4em; margin: .5em 0; }
#editor .pause-mark { color: var(--ink); font-weight: 600; background: var(--lilac); border-radius: var(--r-pill); padding: 0 7px; font-size: .82em; }
#editor .stress-mark { background: var(--lime); border-radius: 3px; padding: 0 2px; }
#editor .eye-mark { color: var(--ink); font-weight: 600; background: var(--mint); border-radius: var(--r-pill); padding: 0 7px; font-size: .82em; }
#editor .note-mark { background: var(--cream); border-radius: var(--r-sm); padding: 0 5px; font-size: .88em; color: var(--ink); }
#editor .breath-mark, #rehearsal-text .breath-mark { color: var(--ink); background: var(--mint); border-radius: var(--r-pill); padding: 0 6px; font-weight: 700; font-size: .82em; margin: 0 2px; }
#rehearsal-text .breath-mark { color: var(--navy); }
#editor-status {
  display: flex; gap: 18px; padding: 10px 18px; font-size: .68rem;
  font-family: var(--mono); letter-spacing: .03em; color: var(--ink); opacity: .75;
  border-top: 1px solid var(--hairline); background: var(--canvas); flex-wrap: wrap;
}
#editor-status b { color: var(--ink); font-weight: 700; }
.fullscreen-editor #layout { grid-template-columns: 0 1fr 0 !important; }
.fullscreen-editor #sidenav, .fullscreen-editor #context { display: none !important; }
.fullscreen-editor #main { max-width: 860px; }

/* 형식 카드 */
.form-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.fcard {
  border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 22px;
  background: var(--canvas); transition: border-color .15s;
  display: flex; flex-direction: column; gap: 6px;
}
.fcard:hover { border-color: var(--ink); }
.fcard.selected { border: 2px solid var(--ink); padding: 21px; background: var(--surface-soft); }
.fcard h4 { margin: 0; font-size: 1.02rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.fcard .fit-badge { margin-left: auto; font-size: .66rem; font-family: var(--mono); color: var(--ink); background: var(--lime); border-radius: var(--r-pill); padding: 3px 9px; }
.fcard p { font-size: .82rem; font-weight: 400; color: var(--ink); }
.fcard .meta { font-size: .76rem; font-weight: 400; color: var(--ink); }
.fcard .meta b { font-weight: 600; }
.fcard .btn { margin-top: auto; }

/* 비교 화면 */
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.compare .col { border-radius: var(--r-md); padding: 18px 20px; font-size: .84rem; }
.compare .col:first-child { background: var(--cream); }
.compare .col:last-child { background: var(--mint); }
.compare .col h4 { margin-top: 0; }
.compare .col ul { padding-left: 1.2em; }

/* 피드백 */
.fb-section { margin-bottom: 8px; }
.fb-item { padding: 13px 17px; background: var(--surface-soft); border-radius: var(--r-md); margin-bottom: 8px; font-size: .87rem; font-weight: 400; }
.fb-item b { display: block; font-size: .68rem; font-family: var(--mono); letter-spacing: .05em; text-transform: uppercase; font-weight: 400; color: var(--ink); opacity: .85; margin-bottom: 3px; }
.fb-item.warn { background: var(--pink); }
.fb-item ul { padding-left: 1.2em; }

/* 제스처 */
.gesture {
  border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 17px 19px; margin-bottom: 10px; background: var(--canvas);
}
.gesture .g-sent { color: var(--ink); font-weight: 600; letter-spacing: -0.015em; margin-bottom: 6px; }
.gesture .g-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 4px 14px; font-size: .8rem; font-weight: 400; color: var(--ink); }
.gesture .g-grid span b { font-weight: 700; }

/* 리허설 모드 — 네이비 컬러블록 */
#rehearsal {
  position: fixed; inset: 0; background: var(--navy); color: #fff;
  z-index: 200; display: flex; flex-direction: column; padding: 24px;
}
#rehearsal-text {
  flex: 1; overflow-y: auto; max-width: 900px; margin: 0 auto; width: 100%;
  font-size: 1.9rem; font-weight: 340; line-height: 1.9; letter-spacing: -0.02em;
  padding: 30px 10px;
}
#rehearsal-text .para { opacity: .25; transition: opacity .3s; margin-bottom: 1.2em; }
#rehearsal-text .para.now { opacity: 1; }
#rehearsal-text .pause-mark { color: var(--navy); background: var(--lilac); }
#rehearsal-text .stress-mark { background: var(--lime); color: var(--navy); }
#rehearsal-text .eye-mark { color: var(--navy); background: var(--mint); }
#rehearsal-bar {
  display: flex; align-items: center; gap: 16px; justify-content: center;
  padding: 12px; background: rgba(255,255,255,.1);
  border-radius: var(--r-lg); max-width: 900px; margin: 0 auto; width: 100%;
}
#rehearsal-bar .timer { font-size: 1.8rem; font-family: var(--mono); font-weight: 400; color: #fff; min-width: 130px; text-align: center; }
#rehearsal-bar button { background: rgba(255,255,255,.16); border: none; color: #fff; border-radius: var(--r-pill); padding: 10px 18px; font-size: .88rem; font-weight: 500; transition: transform .12s ease; }
#rehearsal-bar button:active { transform: scale(0.95); }

/* 체크리스트 */
.checklist label { display: flex; gap: 10px; align-items: flex-start; padding: 8px 4px; font-size: .88rem; font-weight: 400; cursor: pointer; }
.checklist input { margin-top: 4px; accent-color: var(--ink); width: 17px; height: 17px; }

/* ───────── 오른쪽 패널 ───────── */
#context {
  background: var(--canvas); border-left: 1px solid var(--hairline);
  padding: 26px 18px; font-size: .82rem;
}
#context h3 { font-size: .72rem; font-family: var(--mono); letter-spacing: .08em; text-transform: uppercase; font-weight: 400; opacity: .78; margin-bottom: 16px; }
.ctx-item { margin-bottom: 14px; }
.ctx-item .k { font-size: .64rem; font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; font-weight: 400; color: var(--ink); opacity: .75; }
.ctx-item .v { color: var(--ink); line-height: 1.45; font-weight: 400; }
.ctx-item .v.serif { font-weight: 600; letter-spacing: -0.015em; }
.ctx-empty { color: var(--ink); opacity: .75; font-weight: 400; }
.ctx-next {
  margin-top: 18px; background: var(--navy); color: #fff;
  padding: 16px 18px; border-radius: var(--r-lg); font-size: .8rem; font-weight: 400; line-height: 1.5;
}
.ctx-next b { color: var(--lime); font-weight: 600; }

/* ───────── 보관함 ───────── */
.proj-toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.proj-toolbar input { flex: 1; min-width: 180px; padding: 10px 18px; border: 1px solid var(--hairline); border-radius: var(--r-pill); background: var(--canvas); }
.proj-toolbar input:focus { outline: none; border-color: var(--ink); }
.proj-toolbar select { border: 1px solid var(--hairline); border-radius: var(--r-pill); padding: 8px 14px; background: var(--canvas); }
.proj-table { width: 100%; border-collapse: collapse; font-size: .84rem; background: var(--canvas); border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--hairline); }
.proj-table th { text-align: left; background: var(--canvas); color: var(--ink); opacity: .75; padding: 12px; font-family: var(--mono); font-weight: 400; font-size: .64rem; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; border-bottom: 1px solid var(--hairline); }
.proj-table td { padding: 13px 12px; border-bottom: 1px solid var(--hairline-soft); vertical-align: middle; font-weight: 400; }
.proj-table tr:last-child td { border-bottom: none; }
.proj-table tr:hover td { background: var(--surface-soft); }
.proj-title-cell { font-weight: 600 !important; letter-spacing: -0.015em; color: var(--ink); cursor: pointer; }
.proj-fav { cursor: pointer; font-size: 1rem; color: var(--ink); }
.badge { display: inline-block; padding: 3px 12px; border-radius: var(--r-pill); font-size: .68rem; font-family: var(--mono); letter-spacing: .02em; background: var(--surface-soft); color: var(--ink); }
.mini-progress { width: 70px; height: 5px; border-radius: 3px; background: var(--hairline-soft); display: inline-block; overflow: hidden; vertical-align: middle; }
.mini-progress i { display: block; height: 100%; background: var(--ink); }

/* ───────── 모달 ───────── */
#modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 300;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
#modal {
  background: var(--canvas); border-radius: var(--r-lg); max-width: 760px; width: 100%;
  max-height: 88vh; display: flex; flex-direction: column;
}
#modal-head { display: flex; align-items: center; padding: 18px 26px; border-bottom: 1px solid var(--hairline-soft); }
#modal-head h3 { font-size: 1.15rem; font-weight: 600; flex: 1; letter-spacing: -0.02em; }
#modal-body { padding: 24px 26px; overflow-y: auto; }

/* ───────── 토스트/AI 진행 ───────── */
#toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 12px 26px;
  border-radius: var(--r-pill); font-size: .85rem; font-weight: 400; z-index: 400;
}
#ai-progress {
  position: fixed; inset: 0; background: rgba(255,255,255,.85);
  z-index: 350; display: flex; align-items: center; justify-content: center;
}
.ai-progress-box {
  background: var(--lime); border-radius: var(--r-lg);
  padding: 32px 40px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  max-width: 680px; width: 92%;
}
#ai-progress-sub { font-size: .84rem; color: var(--ink); opacity: .9; }
#ai-progress-preview {
  background: #ffffff; color: #111; text-align: left; width: 100%;
  font-size: .95rem; line-height: 1.75; border-radius: 12px;
  padding: 14px 16px; max-height: 42vh; overflow-y: auto; white-space: pre-wrap;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
}
.ai-spinner {
  width: 34px; height: 34px; border-radius: 50%;
  border: 3px solid rgba(0,0,0,.14); border-top-color: var(--ink);
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* 진행 링 — 경과·남은 시간 */
.ai-ring { position: relative; width: 132px; height: 132px; }
.ai-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ai-ring circle { fill: none; stroke-width: 9; stroke-linecap: round; }
.ring-bg { stroke: rgba(0,0,0,.10); }
.ring-fg {
  stroke: var(--fin);
  stroke-dasharray: 326.7; stroke-dashoffset: 326.7;
  transition: stroke-dashoffset .9s linear;
}
.ai-ring-mid {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
}
#ai-progress-timer {
  font-size: 1.5rem; font-weight: 700; font-family: var(--mono);
  letter-spacing: -0.02em; color: var(--ink); opacity: 1;
}
#ai-ring-left { font-size: .64rem; font-family: var(--mono); color: var(--ink); opacity: .7; letter-spacing: .02em; }
#ai-progress-stage {
  font-size: .78rem; color: var(--ink); opacity: .8;
  background: rgba(255,255,255,.55); border-radius: var(--r-pill);
  padding: 5px 14px; letter-spacing: -0.01em;
}
#ai-progress-label { color: var(--ink); font-weight: 600; letter-spacing: -0.02em; }
#ai-progress-timer { font-size: .72rem; font-family: var(--mono); letter-spacing: .04em; color: var(--ink); opacity: .85; }
#ai-progress .btn-ghost { background: transparent; border-color: rgba(0,0,0,.25); }

/* AI 스트리밍 미리보기 */
.stream-preview {
  background: var(--surface-soft); border-radius: var(--r-md);
  padding: 16px 18px; margin-top: 14px; max-height: 300px; overflow-y: auto;
  font-size: .86rem; font-weight: 400; white-space: pre-wrap; color: var(--ink);
}
.ai-note {
  font-size: .76rem; font-weight: 400; color: var(--ink); background: var(--cream);
  border-radius: var(--r-md); padding: 12px 16px; margin-top: 10px;
}
.ai-note b { font-weight: 600; }

/* ───────── 반응형 ───────── */
@media (max-width: 1120px) {
  #layout { grid-template-columns: 210px 1fr; }
  #context { display: none; }
}
@media (max-width: 760px) {
  html { font-size: 16px; }
  #layout { grid-template-columns: 1fr; }
  #sidenav {
    position: fixed; top: 0; left: 0; bottom: 0; width: 260px; z-index: 100;
    transform: translateX(-100%); transition: transform .25s;
    padding-top: calc(88px + env(safe-area-inset-top, 0px));
    border-right: 1px solid var(--hairline); background: var(--canvas);
  }
  body.nav-open #sidenav { transform: translateX(0); box-shadow: 4px 0 30px rgba(0,0,0,.15); }
  body.nav-open #nav-backdrop {
    display: block; position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,.28);
  }
  #btn-menu { display: block; font-size: 1.25rem; padding: 8px 10px; }
  #btn-back { font-size: 1.15rem; padding: 8px 10px; }
  .top-title { display: none; }
  .save-status { display: none; }
  .logo-text span { display: none; }
  .logo { margin-left: 4px; }
  .logo-mark { width: 48px; height: 48px; border-radius: 12px; }
  .logo-text strong { font-size: 1.4rem; }
  .top-btn { white-space: nowrap; padding: 6px 12px; }
  /* 펀치홀·상태바를 피해 상단바를 아래로 내림 */
  #topbar { gap: 6px; padding: calc(16px + env(safe-area-inset-top, 0px)) 12px 12px; }
  #main { padding: 20px 16px 70px; }
  .step-title { font-size: 1.55rem; }
  .form-grid { grid-template-columns: 1fr; }
  .compare { grid-template-columns: 1fr; }
  #editor { padding: 24px 20px; }
  #editor-toolbar { top: 0; }
  #rehearsal-text { font-size: 1.4rem; }
  .card, .cand, .fcard { border-radius: var(--r-md); }
  /* 휴대폰 가독성 */
  .dropzone { flex-direction: column; gap: 8px; padding: 18px 12px; font-size: .82rem; }
  .paste-row { flex-direction: column; }
  .paste-row .btn { align-self: stretch; }
  .step-desc { font-size: .92rem; }
  .proj-toolbar { flex-direction: column; }
  .btn { padding: 12px 20px; }
}

/* ───────── 인쇄 ───────── */
@media print {
  #topbar, #sidenav, #context, #editor-toolbar, #editor-status, .btn-row, #toast, #ai-progress { display: none !important; }
  #layout { display: block; }
  #main { max-width: 100%; padding: 0; }
  #editor-wrap { border: none; }
  #editor { font-size: 12pt; line-height: 1.9; padding: 0; }
  body.print-large #editor { font-size: 17pt; line-height: 2.1; }
  body { background: #fff; }
}

/* 원고 위치 표시(제스처·쉼멈춤) */
.gmark {
  display: inline-block; background: var(--fin); color: #fff; border: none;
  border-radius: 6px; padding: 1px 7px; font-size: .78rem; font-weight: 700;
  margin: 0 3px; cursor: pointer; vertical-align: baseline; line-height: 1.5;
}
.gmark.bmark { background: var(--navy); }
.gmark.on { outline: 2.5px solid var(--ink); outline-offset: 1px; }
.app-ver { font-size: .64rem; font-family: var(--mono); letter-spacing: .04em; color: var(--ink); opacity: .55; padding: 4px 12px 0; }

/* 앱 잠금 화면 */
#app-lock {
  position: fixed; inset: 0; z-index: 10000; background: var(--canvas);
  display: flex; align-items: center; justify-content: center; text-align: center;
}
.lock-box { padding: 30px; }
/* 글자체 선택 */
body.gothic-ui, body.gothic-ui button, body.gothic-ui input, body.gothic-ui textarea, body.gothic-ui select {
  font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", "Noto Sans KR", sans-serif;
}
body.serif-ui, body.serif-ui button, body.serif-ui input, body.serif-ui textarea, body.serif-ui select {
  font-family: "Apple Myungjo", "Nanum Myeongjo", "Noto Serif KR", "AppleMyungjo", serif;
}

/* 화면 밝기 오버레이 */
#bright-ov { position: fixed; inset: 0; pointer-events: none; z-index: 99999; background: transparent; }

/* 오른쪽 패널 도구 */
.tool-row { display: flex; gap: 6px; margin: 8px 0 4px; }
.tool-row input { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--hairline); border-radius: 8px; font-size: .82rem; }
.tool-out { font-size: .8rem; line-height: 1.65; background: var(--surface-soft); border-radius: 8px; padding: 9px 11px; margin-top: 5px; max-height: 300px; overflow-y: auto; }
.tool-out:empty { display: none; }
.tool-out p { margin: 0 0 6px; }

/* 4단계 AI 형식 추천 카드 */
.rec-card { border: 2px solid var(--fin); }
.rec-best {
  background: var(--cream); border-radius: var(--r-md);
  padding: 14px 16px; margin-top: 10px;
}
.rec-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
.rec-best p { font-size: .88rem; line-height: 1.65; margin: 0 0 8px; }
.rec-best .meta { font-size: .8rem; line-height: 1.6; margin-top: 4px; opacity: .9; }

/* 5단계 천재화 리포트 */
.genius-box { margin-top: 4px; }
.gn-verdict {
  background: var(--navy); color: #fff; border-radius: var(--r-md);
  padding: 14px 16px; font-size: .95rem; font-weight: 600; line-height: 1.6; margin-bottom: 12px;
}
.gn-scores { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.gn-score { display: flex; align-items: center; gap: 10px; font-size: .82rem; }
.gn-k { width: 100px; flex-shrink: 0; opacity: .85; }
.gn-bar { flex: 1; height: 8px; background: var(--hairline-soft); border-radius: 4px; overflow: hidden; }
.gn-bar i { display: block; height: 100%; background: var(--fin); border-radius: 4px; }
.gn-v { width: 22px; text-align: right; font-family: var(--mono); font-size: .78rem; font-weight: 700; }
.gn-note { font-size: .82rem; opacity: .85; line-height: 1.6; margin-bottom: 10px; }
.gn-card {
  background: var(--surface-soft); border-radius: var(--r-md);
  padding: 14px 16px; margin-top: 10px;
}
.gn-card.gn-bright { background: var(--cream); }
.gn-card.gn-ideas { background: var(--lime); }
.gn-title { font-weight: 700; font-size: .9rem; margin-bottom: 8px; letter-spacing: -0.02em; }
.gn-card blockquote {
  border-left: 3px solid rgba(0,0,0,.25); margin: 0 0 6px; padding: 2px 0 2px 12px;
  font-size: .9rem; line-height: 1.65;
}
.gn-card p { font-size: .85rem; line-height: 1.65; margin: 0 0 6px; }
.gn-card .meta { font-size: .8rem; line-height: 1.6; margin-top: 4px; }
.gn-fix { background: rgba(255,255,255,.6); border-radius: 6px; padding: 6px 9px; }
.gn-dull + .gn-dull, .gn-idea + .gn-idea { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,.08); }
.gn-idea b { font-size: .88rem; }

/* 제스처 동작 그림 */
.g-art {
  display: flex; align-items: center; gap: 14px;
  background: #fff; border: 1px solid var(--hairline); border-radius: var(--r-md);
  padding: 12px 14px; margin: 8px 0 10px;
}
.g-art-fig { color: var(--ink); flex-shrink: 0; }
.g-fig { width: 76px; height: 92px; display: block; }
.g-art-sm .g-fig { width: 54px; height: 66px; }
.g-art-sm { padding: 8px 12px; gap: 10px; }
.g-art-cap { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.g-art-cap b { font-size: .92rem; letter-spacing: -0.02em; }
.g-art-sm .g-art-cap b { font-size: .84rem; }
.g-art-cap span { font-size: .76rem; opacity: .78; line-height: 1.5; }

/* 편집기 높이 조절 손잡이 */
#editor-resize {
  height: 16px; cursor: ns-resize; background: var(--surface-soft);
  border-top: 1px solid var(--hairline-soft);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
#editor-resize:hover { background: var(--lime); }
#editor-resize span { width: 46px; height: 4px; border-radius: 2px; background: rgba(0,0,0,.22); display: block; }
body.resizing-editor { user-select: none; cursor: ns-resize; }
body.resizing-editor #editor { pointer-events: none; }
@media print { #editor-resize { display: none !important; } }

/* 강약 표시 */
.smark {
  background: var(--lime); border: none; border-radius: 4px;
  padding: 1px 3px; font: inherit; cursor: pointer; color: var(--ink);
}
.smark-strong { background: var(--gold); font-weight: 700; }
.smark.on { outline: 2.5px solid var(--ink); outline-offset: 1px; }
.ms-legend { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; font-size: .78rem; }
.ms-legend .lg { display: inline-flex; align-items: center; gap: 5px; }
.st-list { display: flex; flex-direction: column; gap: 6px; }
.st-item {
  display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center;
  background: var(--surface-soft); border-radius: var(--r-md); padding: 8px 12px;
}
.st-item.st-strong { background: var(--cream); }
.st-word { font-weight: 700; font-size: .92rem; }
.st-how { font-size: .76rem; opacity: .8; }
.st-lv { font-size: .72rem; font-weight: 700; background: var(--lime); border-radius: var(--r-pill); padding: 1px 8px; }
.st-item.st-strong .st-lv { background: var(--gold); }
.st-why { grid-column: 1 / -1; font-size: .78rem; opacity: .82; line-height: 1.5; }

/* 적용 찬양 목록 */
.song-list { display: flex; flex-direction: column; gap: 6px; }
.song-item {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  background: var(--surface-soft); border: 1px solid transparent; border-radius: var(--r-md);
  padding: 11px 14px; font: inherit; color: var(--ink); cursor: pointer;
  transition: border-color .15s, background .15s;
}
.song-item:hover { border-color: var(--ink); background: #fff; }
.song-badge { font-size: .7rem; font-weight: 700; border-radius: var(--r-pill); padding: 2px 9px; flex-shrink: 0; }
.sb-hymn { background: var(--mint); }
.sb-gospel { background: var(--cream); }
.song-title { font-weight: 600; font-size: .92rem; }
.song-artist { font-size: .78rem; opacity: .75; }
.song-go { margin-left: auto; font-size: .76rem; opacity: .7; white-space: nowrap; }
.song-link { text-decoration: none; display: inline-flex; align-items: center; }

/* 기다리는 동안 보여주는 설교학 지식 카드 */
#ai-progress-tip {
  background: rgba(255,255,255,.72); border-radius: 12px;
  padding: 12px 16px; width: 100%; text-align: left;
  font-size: .84rem; line-height: 1.65; color: var(--ink);
  animation: tipIn .5s ease;
}
#ai-progress-tip b { display: block; font-size: .72rem; letter-spacing: .04em; opacity: .7; margin-bottom: 4px; }
@keyframes tipIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* 앱이 지금 무엇을 하고 있는지 알려 주는 줄 */
#ai-progress-say {
  font-size: .86rem; line-height: 1.55; color: var(--ink);
  background: rgba(255,255,255,.66); border-radius: 10px;
  padding: 9px 14px; width: 100%; text-align: left;
  display: flex; gap: 8px; align-items: flex-start;
  animation: sayIn .35s ease;
}
/* 살아 움직이는 신호 — 작은 점이 숨 쉬듯 퍼진다 */
#ai-progress-say::before {
  content: ""; flex-shrink: 0;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--fin); margin-top: 8px;
  animation: livePulse 1.9s cubic-bezier(.4,0,.2,1) infinite;
}
@keyframes livePulse {
  0%   { box-shadow: 0 0 0 0 rgba(255,86,0,.45); transform: scale(1); }
  65%  { box-shadow: 0 0 0 8px rgba(255,86,0,0); transform: scale(1.15); }
  100% { box-shadow: 0 0 0 0 rgba(255,86,0,0); transform: scale(1); }
}
@keyframes sayIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: none; } }

/* 다섯 단계 타일 */
.step-tile {
  position: relative; border-radius: var(--r-md);
  padding: 16px 10px 14px; color: var(--ink);
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  transition: transform .14s ease, filter .15s;
}
.step-tile:hover { transform: translateY(-2px); filter: brightness(1.03); }
.tile-svg {
  width: 26px; height: 26px; display: block;
  fill: none; stroke: currentColor; stroke-width: 1.6;
  stroke-linecap: round; stroke-linejoin: round;
}
.st-ico { opacity: .9; }
.st-lb { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
.st-n {
  position: absolute; top: 8px; right: 10px;
  font-family: var(--mono); font-size: .64rem; font-weight: 700;
  opacity: .42; letter-spacing: .04em;
}

/* 오른쪽 도구 제목 아이콘 */
.tool-h { display: flex; align-items: center; gap: 8px; }
.tool-ico {
  width: 18px; height: 18px; flex-shrink: 0;
  fill: none; stroke: currentColor; stroke-width: 1.7;
  stroke-linecap: round; stroke-linejoin: round; opacity: .85;
}

/* AI 반짝임 아이콘 */
.ai-spark {
  width: 15px; height: 15px; flex-shrink: 0;
  fill: currentColor; stroke: none;
  vertical-align: -2px; margin: 0 2px;
  opacity: .95;
}
.chip .ai-spark { width: 13px; height: 13px; }
h3 .ai-spark, td .ai-spark, p .ai-spark { width: 14px; height: 14px; }

.tool-hint { font-size: .7rem; line-height: 1.5; opacity: .68; margin: 2px 0 4px; }
.tool-mode { font-size: .68rem; opacity: .7; margin-bottom: 5px; display: flex; gap: 6px; align-items: center; }
.tool-mode button {
  background: none; border: none; padding: 0; font: inherit;
  color: var(--fin); text-decoration: underline; cursor: pointer;
}

/* ═════════════════════════════════════════════
   폴리시 레이어 — 같은 디자인 언어, 한 급 위의 마감
   (레이어드 섀도 · 글래스 상단바 · 모션 · 포커스 링)
   ═════════════════════════════════════════════ */
:root {
  --shadow-xs: 0 1px 2px rgba(17, 17, 17, .04);
  --shadow-sm: 0 1px 2px rgba(17, 17, 17, .05), 0 4px 12px rgba(17, 17, 17, .05);
  --shadow-md: 0 2px 4px rgba(17, 17, 17, .05), 0 10px 28px rgba(17, 17, 17, .09);
  --shadow-lg: 0 8px 20px rgba(17, 17, 17, .08), 0 28px 70px rgba(17, 17, 17, .18);
  --ease-out: cubic-bezier(.22, 1, .36, 1);
}
html { scroll-behavior: smooth; }

/* 상단바 — 글래스 블러 (스크롤 시 내용이 은은히 비침) */
#topbar {
  background: rgba(255, 255, 255, .86);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  backdrop-filter: saturate(180%) blur(14px);
}

/* 카드 — 미세한 깊이 + 호버 리프트 */
.card { box-shadow: var(--shadow-xs); transition: box-shadow .25s var(--ease-out); }
.card:hover { box-shadow: var(--shadow-sm); }
.cand, .fcard {
  box-shadow: var(--shadow-xs);
  transition: transform .22s var(--ease-out), box-shadow .25s var(--ease-out), border-color .18s;
}
.cand:hover, .fcard:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.cand.selected, .fcard.selected { box-shadow: var(--shadow-sm); }
.step-tile { transition: transform .22s var(--ease-out), box-shadow .25s var(--ease-out), filter .18s; }
.step-tile:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
#editor-wrap { box-shadow: var(--shadow-xs); }
.proj-table { box-shadow: var(--shadow-xs); }
.proj-table tr:hover td { transition: background .12s; }

/* 버튼 — 부드러운 프레스감 + 프라이머리 호버 */
.btn, .chip, .top-btn, .new-btn {
  transition: transform .16s var(--ease-out), background .18s, border-color .18s,
              box-shadow .22s var(--ease-out), filter .18s;
}
.btn-primary:hover, .btn-gold:hover, .new-btn:hover {
  background: #1c1c1c; box-shadow: 0 6px 18px rgba(0, 0, 0, .22); transform: translateY(-1px);
}
.btn-primary:active, .btn-gold:active, .new-btn:active { transform: scale(.96); box-shadow: none; }
.btn-ghost:hover, .chip:hover { box-shadow: var(--shadow-xs); }
.btn-ai:hover { box-shadow: 0 6px 18px rgba(255, 86, 0, .32); transform: translateY(-1px); }
.btn-ai:active { transform: scale(.96); box-shadow: none; }
#home-new:hover { box-shadow: 0 6px 18px rgba(243, 201, 182, .8); transform: translateY(-1px); }

/* 입력 — 호버 힌트 + 절제된 포커스 링 */
.field input:hover, .field textarea:hover, .field select:hover,
.proj-toolbar input:hover, .tool-row input:hover { border-color: #c9c9c9; }
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--ink); box-shadow: 0 0 0 3.5px rgba(220, 238, 177, .8);
}

/* 키보드 포커스 — 접근성 링 (마우스 클릭에는 안 뜸) */
:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 4px; }
.btn:focus-visible, .chip:focus-visible, .top-btn:focus-visible { outline-offset: 3px; }

/* 모달 — 딥 블러 배경 + 스프링 등장 */
#modal-backdrop {
  background: rgba(15, 15, 15, .45);
  -webkit-backdrop-filter: blur(7px) saturate(120%);
  backdrop-filter: blur(7px) saturate(120%);
  animation: bdIn .22s ease;
}
#modal { box-shadow: var(--shadow-lg); animation: modalIn .3s var(--ease-out); }
@keyframes bdIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalIn { from { opacity: 0; transform: translateY(14px) scale(.985); } to { opacity: 1; transform: none; } }

/* 토스트 — 아래에서 떠오름 */
#toast { box-shadow: var(--shadow-md); animation: toastIn .3s var(--ease-out); }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* AI 진행 상자 — 깊이 + 은은한 배경 블러 */
#ai-progress {
  -webkit-backdrop-filter: blur(5px);
  backdrop-filter: blur(5px);
}
.ai-progress-box { box-shadow: var(--shadow-lg); animation: modalIn .32s var(--ease-out); }

/* 왼쪽 내비 — 항목 전환을 부드럽게 */
.step-nav li { transition: background .16s, transform .16s var(--ease-out); }
.step-nav li:active { transform: scale(.98); }
.step-nav .num { transition: background .2s, color .2s; }
.nav-progress-bar { transition: width .55s var(--ease-out); }

/* 스크롤바 — 가늘고 둥글게 */
* { scrollbar-width: thin; scrollbar-color: #d4d4d0 transparent; }
*::-webkit-scrollbar { width: 9px; height: 9px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: #d9d9d5; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: #bdbdb8; border: 2px solid transparent; background-clip: padding-box; }

/* 헤어라인 디테일 — 표·모달 머리 은은한 구분 */
#modal-head { background: rgba(250, 250, 248, .6); border-radius: var(--r-lg) var(--r-lg) 0 0; }
.proj-table th { background: #fbfbfa; }

/* 배지 호흡 — AI 연결 상태 */
.ai-badge { transition: background .25s; }

/* 책 인용 머리 — [제목] -저자 (최종 원고까지 붉은 글씨) */
.book-cite { color: #c62828; font-weight: 700; }

/* 골라 넣기 — 자리 찍기 목록 */
.pp-item {
  cursor: pointer; border-radius: 8px; padding: 5px 10px; margin: 0 0 3px;
  border: 1px solid transparent; transition: background .12s, border-color .12s;
  font-size: .88rem; line-height: 1.55;
}
.pp-item:hover { background: var(--surface-soft); border-color: var(--hairline); }
.pp-item.sel { background: var(--lime); border-color: var(--ink); font-weight: 600; }
#bp-src::selection, #bp-src *::selection { background: var(--gold); }

/* 움직임을 줄이고 싶은 사용자 존중 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  html { scroll-behavior: auto; }
}

</style>

</header>

<div id="layout">

  <!-- ───────── 왼쪽 내비 ───────── -->
  <nav id="sidenav">

      <li data-step="0"><span class="num">＋</span><span class="lbl">새 설교 시작</span><span class="chk"></span></li>

      <li data-step="4"><span class="num">3</span><span class="lbl">형식 결정</span><span class="chk"></span></li>
      <li data-step="3"><span class="num">4</span><span class="lbl">설교 작성</span><span class="chk"></span></li>
      <li data-step="5"><span class="num">5</span><span class="lbl">연습하기</span><span class="chk"></span></li>
    </ol>
    <div class="nav-progress"><div class="nav-progress-bar" id="nav-progress-bar"></div></div>
    <div class="nav-progress-label" id="nav-progress-label">진행률 0%</div>
    <div class="nav-footer">
      <button class="nav-link" id="btn-save"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>저장</button>
      <button class="nav-link" id="btn-export"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M12 15V3m0 0L8 7m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>내보내기</button>
      <button class="nav-link" id="btn-nav-materials"><svg class="nav-ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M3 15h18M9 7h6"/></svg>자료 서랍<span id="nav-mat-count" class="nav-count hidden"></span></button>
      <button class="nav-link" id="btn-nav-files"><svg class="nav-ico" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>설교 파일</button>

      <div class="ai-badge" id="ai-badge">AI 연결 확인 중…</div>
      <div class="app-ver" id="app-ver"></div>

  <!-- 휴대폰에서 메뉴 열렸을 때 바깥 터치로 닫는 배경 -->

<script>
/* M.WORKS — AI 프롬프트 모듈
 * 『들리는 설교, 끌리는 설교』(도원욱)의 방법론을 단계별 프롬프트로 구현.
 * 설정 화면(프롬프트 관리)에서 각 프롬프트를 수정하면 localStorage 오버라이드가 우선 적용된다.

당신의 역할은 설교를 대신 생산하는 것이 아니라, 설교자가 본문을 연구하고 중심사상을 발견하고 원고를 짓고 연습하도록 돕는 것이다.

[책의 핵심 방법론 — 반드시 따를 것]
1. 본문선택 — 하나님의 니즈와 성도의 니즈가 만나는 본문을 찾는다. 본문의 원래 의미보다 회중의 필요를 앞세우지 않는다.
2. 내용파악 — 해돈 로빈슨의 중심사상(Big Idea): 주요소(저자가 말하려는 것은 무엇인가? 질문 형태)와 보조요소(그것에 대해 무엇이라 말하는가? 본문의 답). 함정 셋: 질문이 너무 넓다 / 답을 본문 밖에서 가져온다 / 단어에서 멈춘다. 중심사상은 두 번 태어난다: 석의의 문장(그때·거기) → 원리의 문장(언제나) → 청중의 문장(지금·여기·우리). 주제문 테스트: ①한 문장인가 ②이 본문에서만 나오는가 ③그 자체로 말이 되는가. 채플의 FCF(타락상황 초점): 이 본문은 왜 필요한가 — 본문이 겨냥하는 인간의 깨어짐을 한 문장으로. 모든 본문을 교만·불순종·기도 부족 같은 상투적 죄로 몰아가지 말 것.
3. 형식결정 — 형식은 그릇이다. 연역(중심사상을 앞에)·귀납(뒤에), 로우리의 플롯, 윌슨의 네 페이지(문제 절반·은혜 절반), 4단계 기법(주장-근거-예시-재주장), 먼로 동기유발 5단계, 원포인트(변주: 질문→선언→명령→각인). 선택 기준: 본문의 성격 × 청중의 상태 × 설교의 목적.
4. 설교작성 — 원고는 쓰는 것이 아니라 깎는 것. 전진·순서·통일. 문장은 단문(귀에는 되감기 버튼이 없다). 제목이 절반. 서론 세 줄에 배려가 보여야 한다. 예화는 창문 — 자리는 설명 다음. 적용은 초대의 문법(누가·무엇을·언제까지·어떻게 확인하는가). 결론은 촌철살인 한 문장으로 닫는다. 믿지 않는 사람이 듣고 있다는 전제로.
5. 연습하기 — 입에서 걸리는 문장은 잘못된 문장. 강세로 굴곡을 만들고, 어미를 내리고, 완급을 조절하고, 결정적 순간에 멈춰라. 30분 안에 끝내라.

[환각 방지 — 절대 규칙]
- 성경 구절 전문을 기억으로 길게 지어내지 말 것. 장절 표기와 요약 중심으로 말하고, 정확한 전문이 필요하면 "사용자가 성경에서 확인해 붙여넣을 것"을 안내한다.

  d.customForms = Array.isArray(d.customForms) ? d.customForms : [];

/* ═══════════════════ 기기 간 자동 동기화 (Netlify Blobs) ═══════════════════ */
// 같은 '동기화 비밀번호'를 넣은 기기끼리 설교가 자동으로 합쳐진다.
// 합집합 병합(id·최신시간 우선)이므로 설교가 사라지지 않는다. AI 키·작성 규칙도 함께 동기화(한 기기에서만 넣으면 됨). 화면 설정만 기기별.
const SYNC_URL = 'https://hansung-tsj.netlify.app/api/mworks-sync';
const SYNC_ARRAYS = ['projects', 'materials', 'reports', 'customForms', 'refPrompts', 'trash'];
let syncRev = 0, syncing = false, pushTimer = null, syncStatus = '';

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function syncOn() { return !!(DB.settings.syncId && window.crypto && crypto.subtle); }
function setSyncStatus(t) {
  syncStatus = t;
  const el = document.querySelector('#set-sync-status');
  if (el) el.innerHTML = t;
  const badge = document.querySelector('#save-status');
  if (badge && syncOn() && t) badge.title = '동기화: ' + t.replace(/<[^>]+>/g, '');
}
// 동기화할 부분만 추린다(설정·AI키 제외)
function syncSubset() {
  const o = {};
  SYNC_ARRAYS.forEach(k => { o[k] = Array.isArray(DB[k]) ? DB[k] : []; });
  o.promptOverrides = DB.promptOverrides || {};
  o.apiKey = DB.settings.apiKey || ''; // AI 키도 함께 동기화(한 기기에서만 넣으면 됨)
  o.rules = DB.settings.rules || '';   // 나의 작성 규칙도 함께
  return o;
}
function mergeById(local, remote, tsField) {
  local = Array.isArray(local) ? local : [];
  remote = Array.isArray(remote) ? remote : [];
  const map = new Map(local.map(x => [x.id, x]));
  remote.forEach(r => {
    if (!r || r.id == null) return;
    const l = map.get(r.id);
    if (!l) map.set(r.id, r);
    else if (tsField && (r[tsField] || 0) > (l[tsField] || 0)) map.set(r.id, r);
  });
  return Array.from(map.values());
}
// 원격 데이터를 로컬 DB에 합친다(설교가 사라지지 않도록 합집합)
function mergeRemote(remote) {
  if (!remote || typeof remote !== 'object') return;
  DB.projects = mergeById(DB.projects, remote.projects, 'updatedAt').map(normProject);
  DB.materials = mergeById(DB.materials, remote.materials, 'createdAt');
  DB.reports = mergeById(DB.reports, remote.reports, 'createdAt');
  DB.customForms = mergeById(DB.customForms, remote.customForms, null);
  DB.refPrompts = mergeById(DB.refPrompts, remote.refPrompts, null);
  DB.trash = mergeById(DB.trash, remote.trash, null);
  // 휴지통 정합: 버린 시각과 마지막 수정 시각을 비교해
  // '나중에 버림'이면 목록에서 빼고, '버린 뒤 복원(더 최근 수정)'이면 휴지통에서 뺀다 — 삭제·복원 모두 기기 간 전파
  const trashAt = new Map(DB.trash.filter(t => t && t.id).map(t => [t.id, t._trashedAt || 0]));
  DB.projects = DB.projects.filter(p => !(trashAt.has(p.id) && trashAt.get(p.id) >= (p.updatedAt || 0)));
  const liveAt = new Map(DB.projects.map(p => [p.id, p.updatedAt || 0]));
  DB.trash = DB.trash.filter(t => !(t && liveAt.has(t.id) && liveAt.get(t.id) > (t._trashedAt || 0)));
  DB.promptOverrides = Object.assign({}, remote.promptOverrides || {}, DB.promptOverrides || {});
  // AI 키: 이 기기에 아직 없으면 다른 기기에서 넣은 키를 받아 자동 연결
  if (remote.apiKey && !DB.settings.apiKey) { DB.settings.apiKey = remote.apiKey; syncAdoptedKey = true; }
  // 나의 작성 규칙: 이 기기가 기본값 그대로면 다른 기기에서 다듬은 규칙을 받는다
  if (remote.rules && DB.settings.rules === defaultRules()) DB.settings.rules = remote.rules;
}
let syncAdoptedKey = false;
async function syncFetch(payload) {
  const r = await fetch(SYNC_URL, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'x-sync-id': DB.settings.syncId },
    body: JSON.stringify(payload),
  });
  return r.json();
}
// 시작·복귀 때: 내려받아 병합하고 다시 올린다(화면 갱신 포함)
async function cloudSync(silent) {
  if (!syncOn() || syncing) return;
  syncing = true;
  if (!silent) setSyncStatus('동기화 중…');
  try { syncEditor(); } catch {} // 편집 중인 원고를 먼저 DB에 담고 병합 — 덮어쓰기 방지
  try {
    const p = await syncFetch({ action: 'pull' });
    if (p && p.data) { try { mergeRemote(JSON.parse(p.data)); } catch {} }
    let rev = (p && p.rev) || 0;
    for (let i = 0; i < 3; i++) {
      const res = await syncFetch({ action: 'push', data: JSON.stringify(syncSubset()), baseRev: rev });
      if (res && res.conflict) { try { mergeRemote(JSON.parse(res.data || '{}')); } catch {} rev = res.rev || rev; continue; }
      if (res && res.ok) { rev = res.rev || rev; break; }
      break;
    }
    syncRev = rev;
    save(true);
    setSyncStatus('✓ 동기화됨 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }));
    if (syncAdoptedKey) { syncAdoptedKey = false; try { await fetchStatus(true); } catch {} } // 받은 AI 키로 연결 상태 갱신
    // 원고를 한창 쓰는 중이면 화면 재구성을 보류 — 커서·입력이 끊기지 않게 (데이터는 이미 병합됨)
    const editing = document.activeElement && document.activeElement.id === 'editor';
    try { if (curId && !cur()) curId = null; if (!editing) render(); } catch (e) { console.warn('동기화 후 화면 갱신 오류(무시):', e); }
  } catch (e) {
    setSyncStatus('오프라인 — 연결되면 자동 재시도');
  }
  syncing = false;
}
// 편집 후: 조용히 올리기만(충돌이면 다음 복귀 때 전체 동기화로 해소 — 편집 중 화면 안 흔듦)
function schedulePush() {
  if (!syncOn()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async () => {
    if (!syncOn() || syncing) return;
    try {
      const res = await syncFetch({ action: 'push', data: JSON.stringify(syncSubset()), baseRev: syncRev });
      if (res && res.ok) { syncRev = res.rev || syncRev; setSyncStatus('✓ 동기화됨 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })); }
      // 충돌이면 그대로 두고, 다음 복귀(cloudSync) 때 병합
    } catch {}
  }, 5000);
}
// 대기 중인 올리기를 지금 바로 실행 (창을 떠나거나 닫기 직전)
async function flushPush() {
  if (!syncOn() || syncing) return;
  clearTimeout(pushTimer);
  try { syncEditor(); } catch {}
  try {
    const res = await syncFetch({ action: 'push', data: JSON.stringify(syncSubset()), baseRev: syncRev });
    if (res && res.ok) syncRev = res.rev || syncRev;
  } catch {}
}
// 창으로 돌아오면 전체 동기화, 창을 떠나면 그 순간까지의 작업을 즉시 올림
document.addEventListener('visibilitychange', () => {
  if (!syncOn()) return;
  if (document.hidden) flushPush();
  else cloudSync(true);
});
window.addEventListener('pagehide', () => { if (syncOn()) flushPush(); });

function getPrompt(key) {
  const base = window.MSGB_PROMPTS[key];
  const ov = DB.promptOverrides[key] || {};
  let system = ov.system || base.system;
  // 프롬프트 서재의 참조 프롬프트를 해당 단계 시스템 지시에 결합 (안내용 괄호 문구는 제거)
  const refs = (DB.refPrompts || [])
    .map(r => ({ name: r.name, target: r.target, text: (r.text || '').replace(/\(여기에 클로드 프로젝트[^)]*\)/g, '').trim() }))
    .filter(r => r.target === key && r.text);
  if (refs.length) {
    system += '\n\n[설교자의 세부작성 프롬프트 — 아래 지침도 함께 따르라]\n' +
      refs.map(r => `《${r.name}》\n${r.text}`).join('\n\n');
  }
  return { system, user: ov.user || base.user, maxTokens: base.maxTokens, label: base.label };
}
function fillSlots(tpl, slots) {
  return tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => (slots[k] == null || slots[k] === '') ? '(없음)' : String(slots[k]));
}

let aiAbort = null;
let aiTimerInt = null;
let progressSub = ''; // showProgress 직전에 setProgressSub()로 지정하는 한 줄 안내
let progressEta = 0;  // 예상 소요(초) — setProgressEta()로 지정
let progressStages = null;
function setProgressSub(t) { progressSub = t; }
function setProgressEta(sec, stages) { progressEta = sec; progressStages = stages || null; }
const RING_LEN = 326.7;
const DEFAULT_STAGES = ['본문과 자료를 읽는 중…', '생각을 정리하는 중…', '문장을 짓는 중…', '다듬어 마무리하는 중…'];
function fmtClock(sec) {
  const m = Math.floor(sec / 60), x = Math.round(sec % 60);
  return m + ':' + String(x).padStart(2, '0');
}
function showProgress(label, key) {
  clearInterval(aiTimerInt); // 앞선 타이머가 남아 겹치지 않게
  $('#ai-progress-label').textContent = label;
  const sub = $('#ai-progress-sub');
  if (progressSub) { sub.innerHTML = progressSub; sub.classList.remove('hidden'); }
  else { sub.textContent = ''; sub.classList.add('hidden'); }
  progressSub = '';
  const eta = progressEta || 90;           // 지정이 없으면 90초로 가정
  const stages = progressStages || DEFAULT_STAGES;
  progressEta = 0; progressStages = null;
  const pv = $('#ai-progress-preview');
  pv.textContent = ''; pv.classList.add('hidden');
  const say = $('#ai-progress-say');
  if (say) { say.textContent = ''; say.classList.add('hidden'); }
  sayTimer = 0;
  const ring = $('#ai-ring-fg');
  ring.style.strokeDashoffset = RING_LEN;
  showProgress._late = false;
  $('#ai-progress').classList.remove('hidden');
  startTips(key);
  const t0 = Date.now();
  $('#ai-progress-timer').textContent = '0:00';
  $('#ai-ring-left').textContent = '약 ' + fmtClock(eta) + ' 예상';
  $('#ai-progress-stage').textContent = stages[0];
  aiTimerInt = setInterval(() => {
    const el = (Date.now() - t0) / 1000;
    $('#ai-progress-timer').textContent = fmtClock(el);
    // 진행률 — 예상 시간을 넘어가면 마지막 8%는 아주 천천히 채운다(끝난 척하지 않기)
    let r = el / eta;
    const pct = r < 1 ? r * 0.92 : Math.min(0.99, 0.92 + (1 - Math.exp(-(r - 1) * 0.7)) * 0.07);
    ring.style.strokeDashoffset = RING_LEN * (1 - pct);
    const left = eta - el;
    $('#ai-ring-left').textContent = left > 5 ? '약 ' + fmtClock(left) + ' 남음' : '곧 완성됩니다';
    const si = Math.min(stages.length - 1, Math.floor(r * stages.length));
    $('#ai-progress-stage').textContent = stages[si];
    // 예상 시간을 넘기면 솔직하게 알린다
    if (r > 1.25 && !showProgress._late) { showProgress._late = true; narrate('생각보다 오래 걸리고 있습니다. 원고가 길거나 서버가 붐빌 때 그렇습니다 — 조금만 더 기다려 주세요.', true); }
  }, 1000);
}
function hideProgress() {
  $('#ai-progress').classList.add('hidden'); clearInterval(aiTimerInt);
  stopTips();
  const say = $('#ai-progress-say');
  if (say) { say.textContent = ''; say.classList.add('hidden'); }
  const pv = $('#ai-progress-preview'); pv.textContent = ''; pv.classList.add('hidden');
}

function makeNarrator(key) {
  const cfg = NARRATION[key] || {};
  let first = false, done = new Set(), lastN = 0, lastChars = 0;
  return full => {
    if (!first) { first = true; narrate(cfg.first || '내용이 나오기 시작했습니다.', true); return; }
    if (cfg.marks) {
      for (let i = 0; i < cfg.marks.length; i++) {
        if (done.has(i)) continue;
        if (cfg.marks[i][0].test(full)) {
          if (narrate(cfg.marks[i][1])) {
            done.add(i);                       // 말한 것만 지운다
            if (cfg.marks[i][2]) showTip(cfg.marks[i][2]);  // 그 대목에 맞는 노하우를 함께
          }
          return;
        }
      }
    }
    if (cfg.count) {
      const n = (full.match(cfg.count[0]) || []).length;
      if (n > lastN && narrate(cfg.count[1](n))) lastN = n;
      if (n > lastN) return;
    }
    const c = full.replace(/\s/g, '').length;
    if (c - lastChars >= 700) { lastChars = c; narrate('지금까지 ' + c.toLocaleString() + '자 썼습니다.'); }
  };
}

function showTip(tag) {
  const el = $('#ai-progress-tip');
  if (!el) return;
  let pick = null;
  if (tag) {   // 지금 하는 일과 같은 갈래에서 아직 안 보여준 것 우선
    const same = PREACH_TIPS.filter(t => t[0] === tag);

  tipSeen.add(pick[1]);

  if (!tipPool.length) tipPool = PREACH_TIPS.slice();

function jsonStreamPeek(buf) {
  const out = [];
  const re = /"([^"\\]{1,24})"\s*:\s*"((?:[^"\\]|\\.){6,})/g;
  let m;
  while ((m = re.exec(buf))) {
    const key = m[1];
    if (/^(key|id|type|level|how|position|fit|score)$/i.test(key)) continue;
    const v = m[2].replace(/\\n/g, ' ').replace(/\\"/g, '"').replace(/\\+$/, '').trim();
    if (v.length > 8) out.push('· ' + v);
  }
  return out.slice(-7).join('\n');
}

/* ═══════════════════ 원고 도우미 ═══════════════════ */
function mdToHtml(md) {
  const lines = md.split('\n');
  let html = '', inList = null, inQuote = false, newPara = false; // newPara: 빈 줄 뒤 = 새 단락 시작
  const closeAll = () => { if (inList) { html += `</${inList}>`; inList = null; } if (inQuote) { html += '</blockquote>'; inQuote = false; } };
  for (let raw of lines) {
    const line = raw.trimEnd();
    const inline = s => esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    if (/^### /.test(line)) { closeAll(); html += '<h3>' + inline(line.slice(4)) + '</h3>'; newPara = false; }
    else if (/^## /.test(line)) { closeAll(); html += '<h2>' + inline(line.slice(3)) + '</h2>'; newPara = false; }
    else if (/^# /.test(line)) { closeAll(); html += '<h1>' + inline(line.slice(2)) + '</h1>'; newPara = false; }
    else if (/^> ?/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } if (!inQuote) { html += '<blockquote>'; inQuote = true; } html += '<p>' + inline(line.replace(/^> ?/, '')) + '</p>'; newPara = false; }
    else if (/^[-•] /.test(line)) { if (inQuote) { html += '</blockquote>'; inQuote = false; } if (inList !== 'ul') { if (inList) html += `</${inList}>`; html += '<ul>'; inList = 'ul'; } html += '<li>' + inline(line.slice(2)) + '</li>'; newPara = false; }
    else if (/^\d+\. /.test(line)) { if (inQuote) { html += '</blockquote>'; inQuote = false; } if (inList !== 'ol') { if (inList) html += `</${inList}>`; html += '<ol>'; inList = 'ol'; } html += '<li>' + inline(line.replace(/^\d+\. /, '')) + '</li>'; newPara = false; }
    else if (line === '') { closeAll(); newPara = true; }
    else { closeAll(); html += '<p' + (newPara ? ' class="pgap"' : '') + '>' + inline(line) + '</p>'; newPara = false; }
  }
  closeAll();
  return html;
}
/* 원고 가독성 정리 — 여러 문장이 붙은 문단을 '한 문장 = 한 줄'로 나눈다.
 * 빈 줄로 시작한 단락 표시(pgap)는 첫 문장에 남겨 단락 사이 여백이 유지된다. */
function formatDraftHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('p').forEach(p0 => {
    if (p0.closest('blockquote')) return;   // 성경 인용은 그대로
    if (p0.children.length) return;         // 굵게·표시 등 서식이 든 문단은 건드리지 않는다
    const t = p0.textContent.replace(/\s+/g, ' ').trim();
    if (t.length < 30) return; // 아주 짧은 문단은 그대로
    const parts = t.split(/(?<=[.?!…])\s+(?=[^)\]”’"'』」])/).map(s => s.trim()).filter(Boolean);
    if (parts.length < 2) return;
    const frag = document.createDocumentFragment();
    parts.forEach((s, i) => {
      const np = document.createElement('p');
      if (i === 0 && p0.className) np.className = p0.className;
      np.textContent = s;
      frag.appendChild(np);
    });
    p0.replaceWith(frag);
  });
  return div.innerHTML;
}
function htmlToText(html) {
  const div = document.createElement('div');
  div.innerHTML = (html || '').replace(/<(h[1-3]|p|li|blockquote|div|br)[^>]*>/gi, '\n$&');
  return div.textContent.replace(/\n{3,}/g, '\n\n').trim();
}
function draftText() { return htmlToText($('#editor') ? $('#editor').innerHTML : (cur() ? cur().draft.html : '')); }
function readingMinutes(text) {
  const chars = (text || '').replace(/\s+/g, ' ').length;
  return chars / (DB.settings.cpm || 300);
}
function fmtMin(m) {
  if (!isFinite(m) || m <= 0) return '0분';
  const mm = Math.floor(m), ss = Math.round((m - mm) * 60);
  return mm + '분 ' + (ss ? ss + '초' : '');
}

/* ── 단계 순서 호환 계층 (14판) ──
 * 책의 순서: 본문선택 → 중심사상 → 형식결정 → 설교작성 → 연습하기.
 * 내부 화면 id(3=설교작성, 4=형식결정)와 기존 데이터(p.step, p.draft, p.form)는 그대로 두고
 * '보이는 순서'만 이 표로 정한다 — 기존 프로젝트가 수정 없이 그대로 열린다. */
const STEP_ORDER = [0, 1, 2, 4, 3, 5];               // 화면 id를 표시 순서대로
const stepOrdinal = id => STEP_ORDER.indexOf(id);     // id → 몇 번째(0~5). 1단계=1 … 형식(4)→3, 작성(3)→4

function progressOf(p) {
  if (!p) return 0;
  let n = 0;
  if (p.inputs.topic) n++;
  if (p.passage.confirmed) n++;
  if (p.central.done) n++;
  if (htmlToText(p.draft.html).length > 300) n++;
  if (p.form.selected) n++;
  if (p.rehearsal.runs.length || p.rehearsal.feedback) n++;
  return Math.round(n / 6 * 100);
}

    li.classList.remove('done');
    if (p) {
      if (s === 0 && p.inputs.topic) li.classList.add('done');
      if (s === 1 && p.passage.confirmed) li.classList.add('done');
      if (s === 2 && p.central.done) li.classList.add('done');
      if (s === 3 && htmlToText(p.draft.html).length > 300) li.classList.add('done');
      if (s === 4 && p.form.selected) li.classList.add('done');
      if (s === 5 && (p.rehearsal.runs.length || p.rehearsal.feedback)) li.classList.add('done');
    }
  });

  $('#nav-progress-bar').style.width = prog + '%';

function newProject() {

function openProject(id) { syncEditor(); curId = id; curView = 'step'; curStep = cur().step || 0; render(); }
function duplicateProject(id) {
  const src = DB.projects.find(p => p.id === id); if (!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = uid(); copy.title = (src.title || src.inputs.topic || '설교') + ' (사본)';
  copy.createdAt = copy.updatedAt = Date.now();
  DB.projects.unshift(copy); save(true); render();
  toast('프로젝트를 복제했습니다.');
}
function trashProject(id) {
  const i = DB.projects.findIndex(p => p.id === id); if (i < 0) return;
  const [p] = DB.projects.splice(i, 1);
  p._trashedAt = Date.now(); DB.trash.unshift(p);
  if (curId === id) curId = null;
  save(true); render(); toast('휴지통으로 이동했습니다. (보관함 하단에서 복원 가능)');
}
function restoreProject(id) {
  const i = DB.trash.findIndex(p => p.id === id); if (i < 0) return;
  const [p] = DB.trash.splice(i, 1); delete p._trashedAt;
  p.updatedAt = Date.now(); // 복원이 '버림'보다 최신임을 기록 — 동기화 병합에서 복원이 이긴다
  DB.projects.unshift(p); save(true); render(); toast('복원했습니다.');
}

/* ═══════════════════ 뒤로 가기 ═══════════════════ */
const viewHistory = [];
let _lastViewKey = null, _lastViewState = null, _restoringView = false;
function trackView() {
  const state = { view: curView, step: curStep, id: curId };
  const key = state.view + '|' + state.step + '|' + state.id;
  if (!_restoringView && _lastViewKey && _lastViewKey !== key) {
    viewHistory.push(_lastViewState);
    if (viewHistory.length > 40) viewHistory.shift();
  }
  _restoringView = false;
  _lastViewKey = key; _lastViewState = state;
  const bb = $('#btn-back');
  if (bb) bb.style.opacity = viewHistory.length ? '1' : '.3';
}
function goBack() {
  syncEditor();
  if (!viewHistory.length) { curView = 'home'; render(); return; }
  const s = viewHistory.pop();
  _restoringView = true;
  curView = s.view; curStep = s.step;
  if (s.id && DB.projects.find(p => p.id === s.id)) curId = s.id;
  render();
}

  const m = $('#main');
  document.body.classList.remove('fullscreen-editor');
  if (curView === 'archive') return renderArchive(m);
  if (curView === 'forms') return renderFormsManager(m);
  if (curView === 'materials') return renderMaterials(m);
  if (curView === 'files') return renderFilesView(m);
  if (curView === 'clinic') return renderClinic(m);
  if (curView === 'prompts') return renderPromptLibrary(m);
  if (curView === 'home') return renderHome(m);
  const p = cur();
  if (!p) return renderHome(m);
  [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5][curStep](m, p);
}

/* ── 자료 서랍 드롭존: 끌어다 놓기 + 붙여넣기 (자료는 설교 작성 때 곳곳에 인용) ── */
function addRefMaterial(type, title, content) {
  DB.materials.unshift({ id: uid(), type, title: cleanExtractedText(title).slice(0, 60), content: cleanExtractedText(content).slice(0, 12000), tags: '', createdAt: Date.now() });
  save(true);
  if (curView === 'materials') render();
}
async function ingestRefFile(f) {
  const name = f.name.replace(/\.[^.]+$/, '');
  if (/\.docx$/i.test(f.name)) {
    // 워드 파일 — 앱 내장 해제기로 본문을 뽑아 담는다
    try {
      const text = await readDocx(f);
      if (!text || text.trim().length < 5) return toast('⚠ "' + name + '" 에서 글을 찾지 못했습니다.', 5000);
      addRefMaterial('메모', name, text);
      toast('📄 워드 "' + name + '" 을 읽어 담았습니다 (' + text.length.toLocaleString() + '자).', 5000);
    } catch (e) { toast('⚠ 워드 읽기 실패: ' + e.message + ' — 내용을 복사해 붙여넣기 칸에 넣어 주세요.', 6000); }
  } else if (/\.(txt|md|text)$/i.test(f.name) || f.type.startsWith('text/')) {
    const fr = new FileReader();
    fr.onload = () => { addRefMaterial('메모', name, fr.result); toast('"' + name + '" 을 담았습니다.'); };
    fr.readAsText(f);
  } else if (f.type.startsWith('image/') || f.type === 'application/pdf') {
    toast('"' + name + '" 내용을 AI가 읽는 중… (1~3분)', 5000);
    const fr = new FileReader();
    fr.onload = async () => {
      try {
        const j = await (await fetch('/api/ocr', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ data: String(fr.result).split(',')[1], mime: f.type, model: DB.settings.model }) })).json();
        if (j.error) return toast('⚠ ' + j.error, 6000);
        addRefMaterial('메모', name, j.text);
        toast('"' + name + '" 내용을 읽어 담았습니다.');
      } catch (e) { toast('⚠ 인식 실패: ' + e.message, 6000); }
    };
    fr.readAsDataURL(f);
  } else {
    toast('한글(HWP)·옛 워드(.doc) 파일은 내용을 복사해서 붙여넣기 칸에 넣어 주세요. (.docx는 그대로 담깁니다)', 5500);
  }
}
function bindRefDrop() {
  const dz = $('#ref-drop'); if (!dz) return;
  const fi = $('#ref-file');
  dz.addEventListener('click', () => fi.click());
  ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
  ['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
  dz.addEventListener('drop', e => { Array.from(e.dataTransfer.files || []).forEach(ingestRefFile); });
  fi.addEventListener('change', e => { Array.from(e.target.files || []).forEach(ingestRefFile); fi.value = ''; });
  const pasteAdd = $('#ref-paste-add');
  pasteAdd.addEventListener('click', () => {
    const t = $('#ref-paste').value.trim();
    if (t.length < 5) return toast('붙여넣은 내용이 없습니다.');
    addRefMaterial('메모', t.split('\n')[0].slice(0, 30), t);
    $('#ref-paste').value = '';
    toast('붙여넣은 자료를 담았습니다.');
  });
}

/* 본문 확정 시 전문 자동 입력 (AI 연결 시) */
async function autoFillPassage(p) {
  if (!aiConnected() || p.passage.text) return;
  try {
    setProgressEta(22, ['본문을 불러오는 중…', '정리하는 중…']);

      { label: p.passage.ref + ' 전문을 입력하는 중…', onDelta: (d, full) => progressPreview(full) });
    if (!p.passage.text) {
      p.passage.text = txt.trim();
      touch(p);
      if (curView === 'step' && curStep === 1) render();
      toast('본문 전문을 자동 입력했습니다. 성경과 한 번 대조해 주세요.', 4500);
    }
  } catch (e) { if (e.message !== 'no-ai') toast('본문 자동 입력 실패 — 직접 붙여넣어 주세요.'); }

async function recommend(p, count, isMore) {
  const i = p.inputs;
  const exclude = isMore && p.passage.candidates.length
    ? '[이미 제시한 본문 — 반복 금지] ' + p.passage.candidates.map(c => c.ref).join(', ')
    : '';
  try {
    setProgressEta(75, ['성경 전체를 훑는 중…', '회중의 필요와 맞춰 보는 중…', '후보를 좁히는 중…', '추천 이유를 쓰는 중…']);
    const r = await callAIJson('recommend', {
      count, topic: i.topic, reason: i.reason, needs: i.needs, audience: i.audience,
      purpose: i.purpose, season: i.season, avoid: i.avoid, exclude,
      extra: (isMore && p.passage.extraReq) ? p.passage.extraReq : '',
    }, { label: isMore ? '추가 요청을 반영해 본문을 더 찾는 중…' : '성경 전체에서 본문 후보를 찾는 중…' });
    const cands = (r.candidates || []).map(c => ({ fit: 7, ...c }));
    p.passage.candidates = isMore ? p.passage.candidates.concat(cands) : cands;
    touch(p); render();

  } catch (e) { if (e.message !== 'no-ai') toast('오류: ' + e.message, 5000); }
}

/* ── T-파싱 관찰 노트 — 본문이 말하게 하는 첫 작업 (설교자가 먼저, AI는 보완만) ── */
/* 본문을 절 단위로 나눠 절 번호를 또렷하게 — 파싱하며 읽기 좋게 */
function versesHtml(text) {
  const t = String(text || '').trim();
  if (!t) return '';
  const parts = [];
  const re = /(?:^|\s)(\d{1,3})\s+/g;
  let m, last = null;
  while ((m = re.exec(t))) {
    if (last) parts.push({ num: last.num, body: t.slice(last.end, m.index).trim() });
    last = { num: m[1], end: re.lastIndex };
  }
  if (last) parts.push({ num: last.num, body: t.slice(last.end).trim() });
  if (!parts.length) return `<p style="margin:0">${esc(t)}</p>`;
  const head = t.slice(0, t.search(re) < 0 ? 0 : t.match(/(?:^|\s)\d{1,3}\s+/).index).trim();
  return (head ? `<p style="margin:0 0 6px">${esc(head)}</p>` : '') + parts.map(v =>
    `<p style="margin:0 0 6px;display:flex;gap:8px"><b style="flex-shrink:0;min-width:24px;text-align:right;font-family:var(--mono);font-size:.78em;color:var(--fin);padding-top:2px">${esc(v.num)}</b><span>${esc(v.body)}</span></p>`).join('');
}

      </details>
    </div>`;
}
function bindTparse(p) {
  const card = $('#tparse-card'); if (!card) return;
  let tpTimer;
  const grabTp = () => {
    card.querySelectorAll('[data-tp-w]').forEach(el => { const r = p.tparse[+el.dataset.tpW]; if (r) r.word = el.value; });
    card.querySelectorAll('[data-tp-n]').forEach(el => { const r = p.tparse[+el.dataset.tpN]; if (r) r.note = el.value; });
    touch(p);
  };
  card.addEventListener('input', () => { clearTimeout(tpTimer); tpTimer = setTimeout(grabTp, 700); }); // 자동 저장
  card.querySelectorAll('[data-tp-del]').forEach(b => b.addEventListener('click', () => {
    grabTp(); p.tparse.splice(+b.dataset.tpDel, 1); touch(p); render();
  }));
  $('#tp-add').addEventListener('click', () => { grabTp(); p.tparse.push({ id: uid(), word: '', note: '' }); touch(p); render(); });
  // 📖 단어 설명·주해 — 멈춘 단어를 그 자리에서 풀어 준다 (자료 서랍의 주석 발췌 우선 인용)
  card.querySelectorAll('[data-tp-ex]').forEach(b => b.addEventListener('click', async () => {
    grabTp();
    const i = +b.dataset.tpEx;
    const row = p.tparse[i];
    if (!row || !row.word.trim()) { toast('먼저 왼쪽 칸에 단어를 적어 주세요.'); return; }
    try {
      setProgressEta(35, ['"' + row.word.trim() + '"를 본문 안에서 읽는 중…', '자료 서랍을 살피는 중…', '주해를 정리하는 중…']);
      const r = await callAIJson('tparseWord', {
        ref: p.passage.ref, passageText: p.passage.text || '(본문 전문 없음 — 장절만으로 주해)',
        word: row.word.trim(), note: row.note.trim() || '(질문 없음)',
        materials: DB.materials.length ? materialsSlot(null) : '(없음)',
      }, { label: '"' + row.word.trim() + '" 단어를 주해하는 중…' });
      row.exegesis = r; touch(p); render();
      const box = $$('#tparse-card .tp-ex')[[...p.tparse.slice(0, i + 1)].filter(x => x.exegesis).length - 1];
      if (box) box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch (e) { if (e.message !== 'no-ai') toast('오류: ' + e.message, 5000); }
  }));
  card.querySelectorAll('[data-tp-exdel]').forEach(b => b.addEventListener('click', () => {
    grabTp(); delete p.tparse[+b.dataset.tpExdel].exegesis; touch(p); render();
  }));
  const tpAi = $('#tp-ai');
  if (tpAi) tpAi.addEventListener('click', async () => {
    grabTp();
    if (!p.tparse.some(r => r.word || r.note)) { toast('먼저 한두 줄이라도 직접 관찰을 적어 주세요 — AI는 빠진 질문을 보완할 뿐입니다.', 5000); return; }
    try {
      setProgressEta(28, ['설교자의 관찰을 읽는 중…', '본문을 다시 읽는 중…', '놓친 자리를 찾는 중…']);
      const r = await callAIJson('tparse', {
        ref: p.passage.ref, passageText: p.passage.text,
        existing: p.tparse.filter(r => r.word || r.note).map(r => r.word + ' — ' + r.note).join('\n') || '(없음)',
      }, { label: '놓친 질문을 찾는 중…' });
      (r.rows || []).slice(0, 6).forEach(x => { if (x && x.word) p.tparse.push({ id: uid(), word: x.word, note: x.note || '', ai: true }); });

    } catch (e) { if (e.message !== 'no-ai') toast('오류: ' + e.message, 5000); }
  });
}
function tparseSlot(p) {

function renderCentral(c) {
